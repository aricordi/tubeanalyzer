        const f = outFormats[(idx*7)%Math.max(1,outFormats.length)];
        const ref = adjVids[(idx*3)%Math.max(1,adjVids.length)];
        item = { id:`i_${idx}`, text:transplantTitle(f,myNiche,t), tag:`borrowed from ${f?.niches[0]||"other niches"}`, tagColor:"#facc15", source:f?`${f.growth} growth · inspired by @${ref?.channel}`:"cross-niche transfer", score:60+(idx%30) };
      } else {
        const ref = inNicheVids[(idx*5)%Math.max(1,inNicheVids.length)] || myVideos[idx%Math.max(1,myVideos.length)];
        item = { id:`i_${idx}`, text:nativeIdea(t,myNiche,ref?.format||"ranked best to worst",idx), tag:"from your niche", tagColor:"var(--accent)", source:ref?`inspired by @${ref.channel} · ${ref.multiplier?.toFixed(1)||"1.0"}x`:`pattern from @${myChannel}`, score:70+(idx%25) };
      }
      out.push(item);
    }
    return out;
  }

  async function fetchIdeasFromAI() {
    const result = await window.TubeAPI.generateIdeas({
      niche: myNiche, topic, count: 12, blend,
      myVideos, competitorVideos,
    });
    if (!result || !Array.isArray(result) || !result.length) return null;
    return result.map((item, i) => ({ id: `ai_${Date.now()}_${i}`, ...item }));
  }

  async function reset() {
    setLoading(true);
    if (window.TubeAPI?.Keys?.hasGemini()) {
      try {
        const aiItems = await fetchIdeasFromAI();
        if (aiItems) { setItems(aiItems); setSeed(aiItems.length); setLoading(false); return; }
      } catch (e) { /* fall through to local */ }
    }
    const fresh = generateBatchLocal(0);
    setItems(fresh); setSeed(fresh.length); setLoading(false);
  }

  function loadMore() {
    setLoading(true);
    // Always use local for "load more" (preserve quota)
    setTimeout(() => {
      const more = generateBatchLocal(seed);
      setItems(prev => [...prev, ...more]);
      setSeed(s => s + more.length);
      setLoading(false);
    }, 300);
  }

  // Auto-load first batch
  useEffect(()=>{ if (items.length === 0) reset(); }, []);

  // Infinite scroll sentinel
  const sentinelRef = useRef(null);
  useEffect(()=>{
    if (!sentinelRef.current) return;
    const obs = new IntersectionObserver((entries)=>{
      if (entries[0].isIntersecting && !loading && items.length > 0 && items.length < 96) {
        loadMore();
      }
    }, { rootMargin: "400px" });
    obs.observe(sentinelRef.current);
    return ()=> obs.disconnect();
  }, [loading, items.length, seed, blend, topic, myChannel]);

  function save(item) { setSavedGen(s=>[{ kind:"idea", ...item, ts: Date.now() }, ...s].slice(0,50)); }

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <h1 className="page-title">Idea generator</h1>
          <p className="page-sub">An endless feed of ideas, scored and tagged by source. Toggle thumbnails on for instant visualization.</p>
        </div>
        <AiBadge/>
      </div>

      <TrainingPanel
        myChannel={myChannel} setMyChannel={setMyChannel} trackers={trackers}
        selectedTrackers={selectedTrackers} setSelectedTrackers={setSelectedTrackers}
        blend={blend} setBlend={setBlend} myVideos={myVideos} competitorVideos={competitorVideos}
        trackedChannels={trackedChannels} myNiche={myNiche}
      />

      <div className="gen-card" style={{maxWidth:"none"}}>
        <div style={{display:"grid", gridTemplateColumns: "1fr auto auto", gap: 12, alignItems:"end"}}>
          <div>
            <div className="adv-label">Anchor topic (optional)</div>
            <input className="gen-input" value={topic} onChange={(e)=>setTopic(e.target.value)} placeholder={`e.g. self-hosted AI tools — leave blank for pure ${myNiche}`}/>
          </div>
          <button className={classNames("chip", withThumbs && "chip-accent active")} onClick={()=>setWithThumbs(s=>!s)} style={{height: 44}}>
            <Icons.Image size={14}/> Thumbnails {withThumbs?"on":"off"}
          </button>
          <button className="btn btn-primary" onClick={reset} style={{height: 44}}>
            <Icons.Sparkle size={14}/> Refresh feed
          </button>
        </div>
      </div>

      {/* Infinite feed */}
      <div className="idea-feed" data-thumbs={withThumbs?"on":"off"}>
        {items.map((o, i)=> (
          <IdeaCard key={o.id} item={o} idx={i} withThumb={withThumbs} onSave={()=>save(o)}/>
        ))}
      </div>

      <div ref={sentinelRef} style={{height: 1}}></div>

      <div style={{textAlign:"center", padding: "24px 0"}}>
        {loading && <div className="mono" style={{fontSize:12, color:"var(--fg-dim)"}}>generating more ideas…</div>}
        {!loading && items.length >= 96 && <div className="mono" style={{fontSize:12, color:"var(--fg-dim)"}}>that's a lot of ideas. refresh for a new batch ↑</div>}
        {!loading && items.length > 0 && items.length < 96 && (
          <button className="btn" onClick={loadMore}>Load more ideas</button>
        )}
      </div>

      {savedGen.filter(s=>s.kind==="idea").length > 0 && (
        <>
          <div className="section-head" style={{marginTop: 24}}><div className="section-title">Saved ideas</div><div className="section-link mono">{savedGen.filter(s=>s.kind==="idea").length}</div></div>
          <div className="gen-card" style={{maxWidth:"none"}}>
            {savedGen.filter(s=>s.kind==="idea").map((o,i)=>(
              <div key={i} className="gen-out" style={{display:"flex", alignItems:"center", gap:12}}>
                <div style={{flex:1, fontSize:13}}>{o.text}</div>
                <button className="btn-icon" style={{color:"var(--fg-dim)"}} onClick={()=>setSavedGen(s=>s.filter(x=>x.ts!==o.ts))}><Icons.X size={14}/></button>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function ThumbGeneratorPage({ myChannel, setMyChannel, trackers }) {
  const [topic, setTopic] = useState("");

  const [selectedTrackers, setSelectedTrackers] = useState(()=> trackers.map(t=>t.id));

  const fileInputRef = useRef(null);
  const [savedGen, setSavedGen] = useState(()=>{
    try { return JSON.parse(localStorage.getItem("ta_generated")) || []; } catch(e) { return []; }
  });
  useEffect(()=>{ localStorage.setItem("ta_generated", JSON.stringify(savedGen)); }, [savedGen]);

  const myCh = window.CHANNELS.find(c=>c.handle===myChannel);
  const myNiche = myCh?.niche;
  const trackedChannels = useMemo(()=>{
    const set = new Set();
    trackers.filter(t=>selectedTrackers.includes(t.id)).forEach(t=>t.channels.forEach(c=>set.add(c)));
    return Array.from(set);
  }, [selectedTrackers, trackers]);
  const competitorVideos = useMemo(()=> window.VIDEOS.filter(v=>trackedChannels.includes(v.channel)), [trackedChannels]);
  const myVideos = useMemo(()=> window.VIDEOS.filter(v=>v.channel===myChannel), [myChannel]);

  function onPick(e, kind) {
    const files = Array.from(e.target.files || []);
    files.forEach(f => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        setRefs(r => [...r, { id: Math.random().toString(36).slice(2,8), kind, url: ev.target.result, name: f.name }]);
      };
      reader.readAsDataURL(f);
    });
    e.target.value = "";
  }

  function removeRef(id) { setRefs(r => r.filter(x=>x.id!==id)); }

  async function generate() {
    setLoading(true);
    // Try Gemini first
    if (window.TubeAPI?.Keys?.hasGemini()) {
      try {
        const result = await window.TubeAPI.generateThumbnailConcepts({ niche: myNiche, topic, count: 6, blend, competitorVideos, refs });
        if (result && Array.isArray(result) && result.length) {
          const useFace = refs.find(r=>r.kind==="face");
          const useChar = refs.find(r=>r.kind==="character");
          const useInsp = refs.find(r=>r.kind==="inspiration");
          const enriched = result.map(item => ({
            ...item,
            refUsed: useFace || useChar || useInsp,
            refTreatment: useFace ? "face-swapped from your upload" : useChar ? "character ref applied" : useInsp ? "color/style lifted from inspiration" : null,
          }));
          setOut(enriched); setLoading(false); return;

      } catch (e) { /* fall through */ }

    // Local fallback
    const t = topic || "your topic";
    const numItems = 6, numCross = Math.round((blend/100)*numItems), numNative = numItems - numCross;

    const useChar = refs.find(r=>r.kind==="character");

    const native = [
      { text:`Big yellow "${t.split(" ")[0]?.toUpperCase()||"WHY"}!" tag · shocked face · red circle on the result`, tag:"your-niche recipe", tagColor:"var(--accent)" },

    for (let i=0;i<numCross;i++) samples.push({ ...cross[i%cross.length], source:"cross-niche transfer"+refSummary });
    setOut(samples); setLoading(false);

function transplantTitle(format, niche, topic) {
  const base = topic && topic !== niche ? topic : niche.toLowerCase();
  if (!format) return `Apply a viral format to ${base}`;
  const t = format.name;
  if (t.includes("POV:")) return `POV: You walked in on the ${base} disaster nobody talks about`;
  if (t.includes("$1 vs")) return `$1 ${base} setup vs $1,000 ${base} setup`;
  if (t.includes("read every")) return `I read every ${base} blog post for a year so you don't have to`;
  if (t.includes("just killed")) return `This new tool just killed every ${base} workflow`;
  if (t.includes("24 hours")) return `24 hours doing nothing but ${base} — what broke me`;
  if (t.includes("worst-to-best")) return `Every ${base} method ranked worst to best`;
  if (t.includes("documentary")) return `The mini-documentary about ${base} that YouTube wasn't ready for`;
  if (t.includes("Whisper")) return `(whispered) the ${base} secret nobody is saying out loud`;
  return `${t} — but for ${base}`;
}
function nativeIdea(topic, niche, format, idx) {
  const variants = [
    `${topic}: ${format} edition — what your competitors haven't tried yet`,

    `I rebuilt ${topic} from scratch — here's what changed`,

  return variants[idx % variants.length];
}

// Generate deterministic retention curve: starts at 100%, drops in interesting ways
function retentionCurve(video) {
  const seed = video.id;
  let h=0; for (let i=0;i<seed.length;i++) h=(h*31+seed.charCodeAt(i))|0;
  const ax = Math.abs(h);
  const points = 40;
  const data = [];
  // Hook strength: how steep first drop is (higher mult => better hook)
  const hookDrop = Math.max(8, 35 - video.multiplier*4);
  // Avg view duration determined by multiplier
  const target = Math.max(28, 30 + video.multiplier*8);
  let cur = 100;
  for (let i=0;i<points;i++) {
    const t = i/(points-1);
    if (i===0) { data.push(100); continue; }
    // Initial hook drop
    if (t < 0.08) cur -= (hookDrop/3) * (1 - (ax%5)/20);
    // Mid drop with re-engagement bumps
    else if (t < 0.5) cur -= (1.2 - (((ax>>i)%3))*0.4);
    else if (t < 0.85) cur -= 1.6;
    else cur -= 0.6;
    // small bumps for re-hook moments
    if (i % (5 + (ax%4)) === 0) cur += 1.5;
    cur = Math.max(target * 0.85, Math.min(100, cur));
    // gravitate toward target by end
    if (t > 0.9) cur = cur*0.7 + target*0.3;
    data.push(+cur.toFixed(1));
  }
  return data;
}

// Score axes (deterministic per video)
function videoScores(video) {
  const seed = video.id;
  let h=0; for (let i=0;i<seed.length;i++) h=(h*37+seed.charCodeAt(i))|0;
  const ax = Math.abs(h);
  const m = video.multiplier;
  function pick(idx, base) { return Math.max(20, Math.min(98, Math.round(base*15 + ((ax>>idx)%30) - 8))); }
  return {
    hook:       pick(0, m),
    thumbnail:  pick(2, m+0.3),
    title:      pick(4, m),
    pacing:     pick(6, m-0.2),
    payoff:     pick(8, m-0.1),
    rewatch:    pick(10, m-0.4),
    ctr:        pick(12, m+0.1),
    avd:        pick(14, m-0.3),
  };
}

// Notable moments per retention curve — auto-detect drops + spikes
function retentionMoments(data) {
  const moments = [];
  // first big drop in opening 12%
  let earlyMin = 0, earlyMinV = 100;
  for (let i=1; i<Math.floor(data.length*0.12); i++) {
    if (data[i] < earlyMinV) { earlyMin = i; earlyMinV = data[i]; }
  }
  if (earlyMinV < 80) moments.push({ idx: earlyMin, type: "drop", label: "Hook dropoff", val: earlyMinV });
  // largest drop anywhere
  let maxDrop = 0, maxDropI = 0;
  for (let i=2; i<data.length; i++) {
    const d = data[i-2] - data[i];
    if (d > maxDrop) { maxDrop = d; maxDropI = i; }
  }
  if (maxDrop > 4 && maxDropI > data.length*0.15) moments.push({ idx: maxDropI, type: "drop", label: "Mid drop", val: data[maxDropI] });
  // any re-engagement spike
  let maxSpike = 0, maxSpikeI = 0;
  for (let i=2; i<data.length-2; i++) {
    const d = data[i] - data[i-2];
    if (d > maxSpike) { maxSpike = d; maxSpikeI = i; }
  }
  if (maxSpike > 1) moments.push({ idx: maxSpikeI, type: "spike", label: "Re-hook", val: data[maxSpikeI] });
  return moments;
}
window.retentionMoments = retentionMoments;

              <div style={{fontSize:14, fontWeight:600}}>Pick a video to compare</div>
              <button className="btn-icon" onClick={()=>setPicker(false)}><Icons.X size={14}/></button>
            </div>
            <div className="cmp-picker-tools">
              <div className="cmp-picker-tabs">
                {["all","tracker","bookmark"].map(k=>(
                  <button key={k} className={classNames("chip", pickerFilter===k && "chip-accent active")} onClick={()=>setPickerFilter(k)}>
                    {k==="all"?"All YouTube":k==="tracker"?"From trackers":"Bookmarked"}
                  </button>
                ))}
              </div>
              <div className="cmp-picker-search">
                <Icons.Search size={14} style={{color:"var(--fg-dim)"}}/>
                <input value={pickerSearch} onChange={e=>setPickerSearch(e.target.value)} placeholder="Search title or @channel"/>
              </div>
            </div>
            <div className="cmp-picker-list">
              {pickerVideos.map(v=>{
                const chosen = picks.includes(v.id);
                return (
                  <button key={v.id} className={classNames("cmp-picker-row", chosen && "chosen")} disabled={chosen || picks.length>=4} onClick={()=>{ add(v); }}>
                    <div className="cmp-picker-thumb"><Thumb video={v}/></div>
                    <div style={{minWidth:0, flex:1, textAlign:"left"}}>
                      <div style={{fontSize:13, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{v.title}</div>
                      <div style={{fontSize:12, color:"var(--fg-dim)"}}>@{v.channel} · {fmtNum(v.views)} views</div>
                    </div>
                    <Outlier m={v.multiplier}/>
                    {chosen ? <Icons.Check size={16} style={{color:"var(--accent)"}}/> : <Icons.Plus size={16} style={{color:"var(--fg-dim)"}}/>}
                  </button>
                );
              })}
              {pickerVideos.length===0 && <div className="empty">No matches.</div>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
window.CompareVideosPage = CompareVideosPage;

function CompareSurface({ videos, onRemove, onAdd, hoverPct, setHoverPct, onOpenVideo, onOpenChannel }) {
  // Retention curves
  const curves = videos.map(v => ({ video: v, data: retentionCurve(v) }));
  // Score map
  const scores = videos.map(v => ({ video: v, scores: videoScores(v) }));

  // Hover index
  const W = 800, H = 280;
  function onSvgMove(e) {
    const r = e.currentTarget.getBoundingClientRect();
    const t = Math.max(0, Math.min(1, (e.clientX - r.left)/r.width));
    setHoverPct(t);
  }
  const hoverIdx = hoverPct == null ? null : Math.round(hoverPct * (curves[0].data.length-1));

  // Scoring axes
  const AXES = [
    { id:"hook",      label:"Hook strength",      desc:"first 30s retention" },
    { id:"thumbnail", label:"Thumbnail clarity",  desc:"reads at 1in tall" },
    { id:"title",     label:"Title curiosity",    desc:"open-loop strength" },
    { id:"pacing",    label:"Pacing",             desc:"cuts per minute" },
    { id:"payoff",    label:"Payoff",             desc:"end-of-video satisfaction" },
    { id:"rewatch",   label:"Rewatch potential",  desc:"30-day return rate" },
    { id:"ctr",       label:"CTR",                desc:"impressions click rate" },
    { id:"avd",       label:"Avg view duration",  desc:"% of length watched" },
  ];

  // Diff
  const diff = useMemo(()=>{
    if (videos.length < 2) return null;
    const a = videos[0], b = videos[1];
    const sa = scores[0].scores, sb = scores[1].scores;
    const items = [
      { k:"Length", a: a.length, b: b.length },
      { k:"Format", a: a.format, b: b.format },
      { k:"Posted", a: a.ago, b: b.ago },
      { k:"Niche",  a: a.niche, b: b.niche },
      { k:"Channel size", a: fmtNum(a.subs), b: fmtNum(b.subs) },
      { k:"Outlier", a: a.multiplier.toFixed(1)+"x", b: b.multiplier.toFixed(1)+"x" },
      { k:"Views", a: fmtNum(a.views), b: fmtNum(b.views) },
    ];
    const biggestGap = AXES.map(ax => ({ ax, gap: Math.abs(sa[ax.id]-sb[ax.id]), winner: sa[ax.id]>sb[ax.id]?"a":"b", a:sa[ax.id], b:sb[ax.id] }))
      .sort((x,y)=>y.gap-x.gap)[0];
    return { items, biggestGap };
  }, [videos]);

  return (
    <>
      {/* Header strip — picked videos */}
      <div className="cmp-strip" style={{gridTemplateColumns: `repeat(${videos.length}, 1fr)${videos.length<4?" 220px":""}`}}>
        {videos.map((v,i)=>(
          <div key={v.id} className="cmp-card">
            <div className="cmp-color-bar" style={{background: COMPARE_COLORS[i]}}></div>
            <button className="cmp-remove" onClick={()=>onRemove(v.id)}><Icons.X size={12}/></button>
            <div className="cmp-card-thumb" onClick={()=>onOpenVideo(v)}><Thumb video={v}/></div>
            <div className="cmp-card-title">{v.title}</div>
            <div className="cmp-card-meta" onClick={()=>onOpenChannel(v.channel)} style={{cursor:"pointer"}}>
              <Avatar handle={v.channel}/>
              <span style={{fontSize:12, color:"var(--fg-mute)"}}>@{v.channel}</span>
            </div>
            <div className="cmp-card-stats">
              <div className="cmp-stat"><div className="cmp-stat-l">Views</div><div className="cmp-stat-v mono">{fmtNum(v.views)}</div></div>
              <div className="cmp-stat"><div className="cmp-stat-l">Outlier</div><div className="cmp-stat-v mono" style={{color: window.outlierHeat(v.multiplier).fg}}>{v.multiplier.toFixed(1)}x</div></div>
              <div className="cmp-stat"><div className="cmp-stat-l">Length</div><div className="cmp-stat-v mono">{v.length}</div></div>
            </div>
          </div>
        ))}
        {videos.length < 4 && (
          <button className="cmp-add" onClick={onAdd}>
            <Icons.Plus size={20}/>
            <div style={{fontSize:13, fontWeight:600, marginTop:8}}>Add video</div>
            <div style={{fontSize:11, color:"var(--fg-dim)"}}>{4-videos.length} slot{4-videos.length===1?"":"s"} left</div>
          </button>
        )}
      </div>

      {/* Retention summary stats */}
      <div className="cmp-stats-strip">
        {curves.map(({video, data}, i)=>{
          const avd = data.reduce((a,b)=>a+b,0)/data.length;
          const drop30 = 100 - data[Math.round(data.length*0.3)];
          const finish = data[data.length-1];
          return (
            <div key={video.id} className="cmp-stat-block">
              <div className="cmp-stat-pin" style={{background: COMPARE_COLORS[i]}}></div>
              <div className="cmp-stat-grid">
                <div><div className="cmp-stat-l">Avg watched</div><div className="cmp-stat-v mono">{avd.toFixed(0)}%</div></div>
                <div><div className="cmp-stat-l">30% drop</div><div className="cmp-stat-v mono">−{drop30.toFixed(0)}pp</div></div>
                <div><div className="cmp-stat-l">Finished</div><div className="cmp-stat-v mono">{finish.toFixed(0)}%</div></div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Retention chart */}
      <div className="cmp-block">
        <div className="cmp-block-head">
          <div>
            <div className="cmp-block-title">Audience retention</div>
            <div className="cmp-block-sub">% of viewers still watching at each point. Markers flag hook drops, mid-video losses, and re-engagement spikes.</div>
          </div>
          <div className="cmp-legend">
            {videos.map((v,i)=>(<div key={v.id} className="cmp-legend-item"><span className="cmp-dot" style={{background:COMPARE_COLORS[i]}}></span>{v.title.slice(0,28)}{v.title.length>28?"…":""}</div>))}
          </div>
        </div>
        <div className="cmp-chart" onMouseMove={onSvgMove} onMouseLeave={()=>setHoverPct(null)}>
          <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" width="100%" height={H}>
            {/* grid */}
            {[0,25,50,75,100].map(p=>{
              const y = H - (p/100)*(H-30) - 20;
              return <g key={p}>
                <line x1="40" x2={W} y1={y} y2={y} stroke="var(--line)" strokeDasharray="3 3"/>
                <text x="6" y={y+4} fill="var(--fg-dim)" fontSize="11" fontFamily="JetBrains Mono, monospace">{p}%</text>
              </g>;
            })}
            {/* x ticks */}
            {[0, 0.25, 0.5, 0.75, 1].map((p,i)=>{
              const x = 40 + p*(W-50);
              return <g key={i}>
                <line x1={x} x2={x} y1={H-20} y2={H-16} stroke="var(--fg-dim)"/>
                <text x={x} y={H-4} fill="var(--fg-dim)" fontSize="11" textAnchor="middle" fontFamily="JetBrains Mono, monospace">{Math.round(p*100)}%</text>
              </g>;
            })}
            {/* moment markers */}
            {curves.map(({video, data}, i)=>{
              const color = COMPARE_COLORS[i];
              const moments = retentionMoments(data);
              return moments.map((mo, mi)=>{
                const x = 40 + (mo.idx/(data.length-1))*(W-50);
                const y = H - (mo.val/100)*(H-30) - 20;
                return (
                  <g key={video.id+"_m_"+mi} opacity={hoverIdx==null ? 1 : 0.35}>
                    <circle cx={x} cy={y} r="4" fill={color} stroke="var(--bg-0)" strokeWidth="2"/>
                    <line x1={x} x2={x} y1={y-6} y2={y-14} stroke={color} strokeWidth="1.4"/>
                  </g>
                );
              });
            })}
            {/* lines */}
            {curves.map(({video, data}, i)=>{
              const color = COMPARE_COLORS[i];
              const pts = data.map((d, idx)=>{
                const x = 40 + (idx/(data.length-1))*(W-50);
                const y = H - (d/100)*(H-30) - 20;
                return [x,y];
              });
              const lineD = pts.map(([x,y],j)=> j===0?`M${x},${y}`:`L${x},${y}`).join(" ");
              const areaD = lineD + ` L${pts[pts.length-1][0]},${H-20} L${pts[0][0]},${H-20} Z`;
              return <g key={video.id}>
                <path d={areaD} fill={color} fillOpacity=".07"/>
                <path d={lineD} fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
              </g>;
            })}
            {/* hover */}
            {hoverIdx != null && (()=>{
              const x = 40 + (hoverIdx/(curves[0].data.length-1))*(W-50);
              return <g>
                <line x1={x} x2={x} y1="10" y2={H-20} stroke="var(--fg-mute)" strokeDasharray="3 3"/>
                {curves.map(({video, data}, i)=>{
                  const y = H - (data[hoverIdx]/100)*(H-30) - 20;
                  return <circle key={video.id} cx={x} cy={y} r="5" fill={COMPARE_COLORS[i]} stroke="var(--bg-0)" strokeWidth="2"/>;
                })}
              </g>;
            })()}
          </svg>
          {hoverIdx != null && (
            <div className="cmp-tooltip" style={{ left: `calc(40px + ${(hoverIdx/(curves[0].data.length-1))*100}% - ${(hoverIdx/(curves[0].data.length-1))*50}px)` }}>
              <div className="cmp-tooltip-head mono">at {Math.round((hoverIdx/(curves[0].data.length-1))*100)}% mark</div>
              {curves.map(({video, data}, i)=>(
                <div key={video.id} className="cmp-tooltip-row">
                  <span className="cmp-dot" style={{background: COMPARE_COLORS[i]}}></span>
                  <span style={{flex:1, fontSize:12}}>@{video.channel}</span>
                  <span className="mono" style={{fontSize:12, fontWeight:600}}>{data[hoverIdx].toFixed(0)}%</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Score breakdown */}
      <div className="cmp-block">
        <div className="cmp-block-head">
          <div>
            <div className="cmp-block-title">Score breakdown</div>
            <div className="cmp-block-sub">AI-rated dimensions, 0–100. Look for axes where one video dominates.</div>
          </div>
        </div>
        <div className="cmp-axes">
          {AXES.map(ax=>{
            const max = Math.max(...scores.map(s=>s.scores[ax.id]));
            return (
              <div key={ax.id} className="cmp-axis">
                <div className="cmp-axis-label">
                  <span>{ax.label}</span>
                  <span className="cmp-axis-desc">{ax.desc}</span>
                </div>
                <div className="cmp-axis-rows">
                  {scores.map((s,i)=>{
                    const v = s.scores[ax.id];
                    const isWinner = v === max;
                    return (
                      <div key={s.video.id} className="cmp-axis-row">
                        <div className="cmp-axis-track">
                          <div style={{width: v+"%", background: COMPARE_COLORS[i], opacity: isWinner?1:0.5}}></div>
                        </div>
                        <div className="mono cmp-axis-val">{v}{isWinner && <span className="cmp-axis-trophy"> ★</span>}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Quick diff (only when exactly 2 videos) */}
      {videos.length === 2 && diff && (
        <div className="cmp-block">
          <div className="cmp-block-head">
            <div>
              <div className="cmp-block-title">Head-to-head</div>
              <div className="cmp-block-sub">What's actually different between these two.</div>
            </div>
          </div>
          <div className="cmp-h2h">
            <div className="cmp-h2h-side">
              <div className="cmp-h2h-name"><span className="cmp-dot" style={{background:COMPARE_COLORS[0]}}></span>@{videos[0].channel}</div>
            </div>
            <div className="cmp-h2h-mid mono" style={{fontSize:12, color:"var(--fg-dim)"}}>vs</div>
            <div className="cmp-h2h-side" style={{textAlign:"right"}}>
              <div className="cmp-h2h-name" style={{justifyContent:"flex-end"}}>@{videos[1].channel} <span className="cmp-dot" style={{background:COMPARE_COLORS[1]}}></span></div>
            </div>
          </div>
          <div className="cmp-h2h-table">
            {diff.items.map(it=>(
              <div key={it.k} className="cmp-h2h-row">
                <div className="cmp-h2h-cell" style={{textAlign:"left"}}>{it.a}</div>
                <div className="cmp-h2h-key">{it.k}</div>
                <div className="cmp-h2h-cell" style={{textAlign:"right"}}>{it.b}</div>
              </div>
            ))}
          </div>
          <div className="cmp-takeaway">
            <Icons.Sparkle size={14} style={{color:"var(--accent)"}}/>
            <span>Biggest gap: <strong>{diff.biggestGap.ax.label}</strong> — @{(diff.biggestGap.winner==="a"?videos[0]:videos[1]).channel} wins {diff.biggestGap.gap} points. Steal that lever first.</span>
          </div>
        </div>
      )}
    </>
  );
}


/* ============================================================
   THUMBNAIL MOCKUP TOOL
   Place a chosen thumbnail (yours, bookmarked, or any video's) into
   YouTube-style chrome on desktop home, mobile home, and search results.
   ============================================================ */

function ThumbMockupPage({ onOpenVideo, bookmarks, trackers, myChannel }) {
  const [pickedId, setPickedId] = useState(()=> window.VIDEOS[0]?.id);
  const [device, setDevice] = useState("desktop"); // desktop | mobile
  const [context, setContext] = useState("home"); // home | search | sidebar
  const [picker, setPicker] = useState(false);
  const [pickerFilter, setPickerFilter] = useState("trending");
  const [pickerSearch, setPickerSearch] = useState("");
  const [titleOverride, setTitleOverride] = useState("");
  const [showCompetition, setShowCompetition] = useState(true);

  const picked = window.VIDEOS.find(v=>v.id===pickedId);
  const trackerHandles = new Set(trackers.flatMap(t=>t.channels));

  // Pool of videos to render around the user's pick (sibling thumbnails)
  const competition = useMemo(()=>{
    if (!picked) return [];
    return window.VIDEOS.filter(v=>v.id!==picked.id && (v.niche===picked.niche || trackerHandles.has(v.channel)))
      .sort((a,b)=>b.multiplier-a.multiplier).slice(0, 12);
  }, [picked, trackerHandles]);

  const pickerVideos = useMemo(()=>{
    let list = window.VIDEOS;
    if (pickerFilter === "tracker") list = list.filter(v=>trackerHandles.has(v.channel));
    if (pickerFilter === "bookmark") list = list.filter(v=>bookmarks.includes(v.id));
    if (pickerFilter === "trending") list = list.slice().sort((a,b)=>b.multiplier-a.multiplier);
    if (pickerSearch) {
      const s = pickerSearch.toLowerCase();
      list = list.filter(v=>v.title.toLowerCase().includes(s) || v.channel.toLowerCase().includes(s));
    }
    return list.slice(0, 36);
  }, [pickerFilter, pickerSearch, bookmarks, trackerHandles]);

  if (!picked) return <div className="page"><div className="empty">No videos available.</div></div>;
  const displayed = titleOverride ? { ...picked, title: titleOverride } : picked;

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <h1 className="page-title">Thumbnail mockup</h1>
          <p className="page-sub">See your thumbnail in real YouTube chrome — desktop home, mobile feed, search results — surrounded by competing videos.</p>
        </div>
      </div>

      {/* Toolbar */}
      <div className="mockup-toolbar">
        <div className="mockup-toolbar-block">
          <div className="mockup-toolbar-label">Thumbnail</div>
          <button className="mockup-pick-btn" onClick={()=>setPicker(true)}>
            <div className="mockup-pick-thumb"><Thumb video={picked}/></div>
            <div style={{minWidth:0, textAlign:"left", flex:1}}>
              <div style={{fontSize:12, color:"var(--fg-dim)"}}>Currently showing</div>
              <div style={{fontSize:13, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{picked.title}</div>
            </div>
            <Icons.Edit size={14} style={{color:"var(--fg-dim)"}}/>
          </button>
        </div>

        <div className="mockup-toolbar-block">
          <div className="mockup-toolbar-label">Device</div>
          <div style={{display:"flex", gap:6}}>
            {[{k:"desktop", l:"Desktop"},{k:"mobile", l:"Mobile"}].map(o=>(
              <button key={o.k} className={classNames("chip", device===o.k && "chip-accent active")} onClick={()=>setDevice(o.k)}>{o.l}</button>
            ))}
          </div>
        </div>

        <div className="mockup-toolbar-block">
          <div className="mockup-toolbar-label">Context</div>
          <div style={{display:"flex", gap:6}}>
            {[{k:"home", l:"Home feed"},{k:"search", l:"Search results"},{k:"sidebar", l:"Watch sidebar"}].map(o=>(
              <button key={o.k} className={classNames("chip", context===o.k && "chip-accent active")} onClick={()=>setContext(o.k)} disabled={device==="mobile" && o.k==="sidebar"}>{o.l}</button>
            ))}
          </div>
        </div>

        <div className="mockup-toolbar-block">
          <div className="mockup-toolbar-label">Override title</div>
          <input value={titleOverride} onChange={e=>setTitleOverride(e.target.value)} placeholder={picked.title}
            style={{background:"var(--bg-2)", border:"1px solid var(--line)", borderRadius:8, padding:"8px 10px", outline:0, fontSize:13, minWidth: 240, width: 240}}/>
        </div>

        <div className="mockup-toolbar-block" style={{marginLeft:"auto"}}>
          <div className="mockup-toolbar-label">&nbsp;</div>
          <button className="chip" onClick={()=>setShowCompetition(s=>!s)} style={{opacity: showCompetition?1:0.5}}>
            <Icons.Eye size={12}/> {showCompetition ? "Hide" : "Show"} competition
          </button>
        </div>
      </div>

      {/* Mockup stage */}
      <div className="mockup-stage">
        {device === "desktop" ? (
          <YTDesktop context={context} picked={displayed} competition={showCompetition?competition:[]} myChannel={myChannel}/>
        ) : (
          <YTMobile context={context} picked={displayed} competition={showCompetition?competition:[]} myChannel={myChannel}/>
        )}
      </div>

      {/* Insight strip */}
      <div className="mockup-insights">
        <div className="mockup-insight-card">
          <Icons.Eye size={14} style={{color:"var(--accent)"}}/>
          <div>
            <div className="mockup-insight-l">Visual contrast</div>
            <div className="mockup-insight-v">High</div>
          </div>
        </div>
        <div className="mockup-insight-card">
          <Icons.Type size={14} style={{color:"var(--accent)"}}/>
          <div>
            <div className="mockup-insight-l">Title length</div>
            <div className="mockup-insight-v">{displayed.title.length} chars · {displayed.title.length>60?"may truncate":"fits"}</div>
          </div>
        </div>
        <div className="mockup-insight-card">
          <Icons.Star size={14} style={{color:"var(--accent)"}}/>
          <div>
            <div className="mockup-insight-l">Predicted CTR uplift</div>
            <div className="mockup-insight-v">+{Math.round(picked.multiplier*4 + 8)}% vs niche avg</div>
          </div>
        </div>
        <div className="mockup-insight-card">
          <Icons.Compass size={14} style={{color:"var(--accent)"}}/>
          <div>
            <div className="mockup-insight-l">Context sample</div>
            <div className="mockup-insight-v">{competition.length} competing thumbs · {picked.niche} niche</div>
          </div>
        </div>
      </div>

      {picker && (
        <div className="cmp-picker-wrap" onClick={()=>setPicker(false)}>
          <div className="cmp-picker" onClick={e=>e.stopPropagation()}>
            <div className="cmp-picker-head">
              <div style={{fontSize:14, fontWeight:600}}>Pick a thumbnail</div>
              <button className="btn-icon" onClick={()=>setPicker(false)}><Icons.X size={14}/></button>
            </div>
            <div className="cmp-picker-tools">
              <div className="cmp-picker-tabs">
                {[["trending","Trending outliers"],["tracker","From trackers"],["bookmark","Bookmarked"],["all","All"]].map(([k,l])=>(
                  <button key={k} className={classNames("chip", pickerFilter===k && "chip-accent active")} onClick={()=>setPickerFilter(k)}>{l}</button>
                ))}
              </div>
              <div className="cmp-picker-search">
                <Icons.Search size={14} style={{color:"var(--fg-dim)"}}/>
                <input value={pickerSearch} onChange={e=>setPickerSearch(e.target.value)} placeholder="Search title or @channel"/>
              </div>
            </div>
            <div className="mockup-picker-grid">
              {pickerVideos.map(v=>(
                <button key={v.id} className={classNames("mockup-picker-card", v.id===pickedId && "chosen")} onClick={()=>{ setPickedId(v.id); setTitleOverride(""); setPicker(false); }}>
                  <div className="mockup-picker-thumb"><Thumb video={v}/></div>
                  <div style={{padding:"8px 10px", textAlign:"left"}}>
                    <div style={{fontSize:12, fontWeight:600, lineHeight:1.3, display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden"}}>{v.title}</div>
                    <div style={{fontSize:11, color:"var(--fg-dim)", marginTop: 4, display:"flex", alignItems:"center", gap:6}}>
                      <span>@{v.channel}</span>
                      <span style={{color: window.outlierHeat(v.multiplier).fg, fontWeight:600}}>{v.multiplier.toFixed(1)}x</span>
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
window.ThumbMockupPage = ThumbMockupPage;

// ---- YT chrome components ----
function YTDesktop({ context, picked, competition, myChannel }) {
  const myCh = window.CHANNELS.find(c=>c.handle===myChannel);

function TopBar({ search, setSearch, onSearchSelect, navigate, videoMap }) {
  const [focused, setFocused] = useState(false);
  const results = useMemo(() => {
    if (!search) return null;
    const s = search.toLowerCase();
    const channels = window.CHANNELS.filter(c => c.handle.toLowerCase().includes(s) || (c.name || '').toLowerCase().includes(s)).slice(0, 3);
    // Search mock videos + cached real videos
    const allVids = [...window.VIDEOS, ...Array.from(videoMap.values()).filter(v => !window.VIDEOS.find(m => m.id === v.id))];
    const videos  = allVids.filter(v => (v.title || '').toLowerCase().includes(s)).slice(0, 5);
    const niches  = window.NICHES.filter(n => n.toLowerCase().includes(s)).slice(0, 3);
    return { channels, videos, niches };
  }, [search, videoMap]);

  const showResults = focused && search && results && (results.channels.length || results.videos.length || results.niches.length);

  return (
    <div className="topbar">
      <div className="search" style={{ position: "relative" }}>
        <Icons.Search size={16} style={{ color: "var(--fg-dim)" }}/>
        <input
          placeholder="Search videos, channels, niches…"

          onChange={e => setSearch(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setTimeout(() => setFocused(false), 120)}

              <button key={c.handle} className="nav-item" onClick={() => onSearchSelect({ type: "channel", id: c.handle })}>
                <Avatar handle={c.handle}/>
                <span style={{ flex: 1, textAlign: "left" }}>@{c.handle} <span style={{ color: "var(--fg-dim)" }}>· {fmtNum(c.subs)}</span></span>
              </button>
            ))}
            {results.niches.length > 0 && <div className="nav-section" style={{ padding: "6px 10px" }}>Niches</div>}
            {results.niches.map(n => (
              <button key={n} className="nav-item" onClick={() => onSearchSelect({ type: "niche", id: n })}>
                <Icons.Compass size={14} style={{ color: "var(--accent)" }}/>
                <span style={{ flex: 1, textAlign: "left" }}>{n}</span>
              </button>
            ))}
            {results.videos.length > 0 && <div className="nav-section" style={{ padding: "6px 10px" }}>Videos</div>}
            {results.videos.map(v => (
              <button key={v.id} className="nav-item" onClick={() => onSearchSelect({ type: "video", v })}>
                <div style={{ width: 60, height: 34, borderRadius: 6, background: "var(--bg-2)", overflow: "hidden", position: "relative", flex: "0 0 60px" }}>
                  <Thumb video={v}/>
                </div>
                <div style={{ flex: 1, textAlign: "left", minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 500, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{v.title}</div>
                  <div style={{ fontSize: 11, color: "var(--fg-dim)" }}>@{v.channel} · {fmtNum(v.views)} views · {v.multiplier?.toFixed(1)}x</div>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>
      <button className="btn" onClick={() => {
        const all = window.VIDEOS;
        const v = all[Math.floor(Math.random() * all.length)];
        if (v) onSearchSelect({ type: "video", v });
      }}>
        <Icons.Sparkle size={14}/> Random outlier
      </button>
      <button className="btn btn-icon" onClick={() => navigate({ page: "settings" })} title="Settings">
        <Icons.Edit size={16}/>
      </button>
    </div>
  );
}

/* ── App ── */
function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  useLayoutEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--accent", t.accent);
    root.style.setProperty("--sidebar-w", t.sidebarWidth + "px");
    root.style.setProperty("--thumb-ar", t.thumbAspect);
    root.setAttribute("data-density", t.density);
    root.setAttribute("data-theme", t.theme);
  }, [t]);

  // ── Setup state ──
  const [setupDone, setSetupDone] = useState(() => {
    return !!(localStorage.getItem('ta_setup_done') ||
              window.TubeAPI?.Keys?.hasYt() ||
              window.TubeAPI?.Keys?.hasGemini());
  });
  function handleSetupDone(mode) {
    localStorage.setItem('ta_setup_done', mode);
    setSetupDone(true);
    refreshKeyStatus();
  }

  // ── API key status ──
  const [hasKeys, setHasKeys] = useState({
    yt: !!window.TubeAPI?.Keys?.hasYt(),
    gemini: !!window.TubeAPI?.Keys?.hasGemini(),
  });
  function refreshKeyStatus() {
    setHasKeys({
      yt: !!window.TubeAPI?.Keys?.hasYt(),
      gemini: !!window.TubeAPI?.Keys?.hasGemini(),
    });
  }

  // ── Routing ──
  const [route, setRoute] = useState({ page: "home" });
  const [history, setHistory] = useState([]);
  function navigate(next) { setHistory(h => [...h, route]); setRoute(next); }
  function back() {
    setHistory(h => {
      if (!h.length) { setRoute({ page: "home" }); return h; }
      const last = h[h.length - 1]; setRoute(last); return h.slice(0, -1);
    });
  }
  function navRoot(page) { setHistory([]); setRoute({ page }); }

  // ── Filters ──
  const [filters, setFilters] = useState({
    niche: "All", multRange: [0.5, 6], subsRange: [0, 5_000_000],
    lengthRange: [0, 60 * 60], ageDays: 365, sort: "recent",
  });
  const [search, setSearch] = useState("");

  // ── Trackers (persisted) ──
  const [trackers, setTrackers] = useState(() => {
    try {
      const raw = localStorage.getItem("ta_trackers");
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return [
      { id: "t_horror", name: "Horror creators",  channels: ["GhostStreetCo"], channelMeta: {} },
      { id: "t_money",  name: "Money & finance",   channels: ["AlexHormoziCuts", "LedgerLine", "CryptoFloor"], channelMeta: {} },
    ];
  });
  const [activeTracker, setActiveTracker] = useState(() => trackers[0]?.id || null);
  useEffect(() => { localStorage.setItem("ta_trackers", JSON.stringify(trackers)); }, [trackers]);

  // ── Bookmarks ──
  const [bookmarks, setBookmarks] = useState(() => {
    try { return JSON.parse(localStorage.getItem("ta_bookmarks")) || []; } catch (e) { return []; }
  });
  function toggleBookmark(id) { setBookmarks(b => b.includes(id) ? b.filter(x => x !== id) : [...b, id]); }
  useEffect(() => { localStorage.setItem("ta_bookmarks", JSON.stringify(bookmarks)); }, [bookmarks]);

  // ── Video cache for real videos (for bookmarks + search) ──
  const [videoMap, setVideoMap] = useState(() => new Map());
  function cacheVideos(videos) {
    if (!videos?.length) return;
    setVideoMap(prev => {
      const next = new Map(prev);
      videos.forEach(v => { if (v?.id) next.set(v.id, v); });
      return next;
    });
  }

  // ── My channel ──
  const [myChannel, setMyChannel] = useState(() => localStorage.getItem("ta_my_channel") || window.MY_CHANNEL_DEFAULT);
  useEffect(() => { localStorage.setItem("ta_my_channel", myChannel); }, [myChannel]);

  // ── Navigation helpers ──
  function openVideo(v) {
    if (v?.id) cacheVideos([v]);
    navigate({ page: "video", id: v.id, video: v });
  }
  function openChannel(handle) { navigate({ page: "channel", id: handle }); }
  function goToSettings() { navigate({ page: "settings" }); }

  function onSearchSelect(sel) {
    setSearch("");
    if (sel.type === "channel") openChannel(sel.id);
    if (sel.type === "video") {
      if (sel.v) { openVideo(sel.v); return; }
      const v = window.VIDEOS.find(v => v.id === sel.id) || videoMap.get(sel.id);
      if (v) openVideo(v);
    }
    if (sel.type === "niche") {
      setFilters(f => ({ ...f, niche: sel.id }));
      navRoot("home");
    }
  }

  // Refresh key status when returning to settings page
  useEffect(() => {
    if (route.page === "settings") refreshKeyStatus();
  }, [route.page]);

  // ── Show setup page on first run ──
  if (!setupDone) {
    return (
      <div className="app" style={{ display: 'block' }}>
        <window.SetupPage onDone={handleSetupDone}/>
      </div>
    );
  }

  // ── Route → body ──
  const videoCache = Array.from(videoMap.values());
  let body;

  if (route.page === "home") {
    body = <window.HomePage
      filters={filters} setFilters={setFilters} search={search}
      onOpenVideo={openVideo} onOpenChannel={openChannel}
      bookmarks={bookmarks} toggleBookmark={toggleBookmark}
      niches={window.NICHES} myChannel={myChannel} trackers={trackers}
      onGoToSettings={goToSettings}
    />;
  } else if (route.page === "discover") {
    body = <window.DiscoverPage
      onOpenVideo={openVideo} onOpenChannel={openChannel}
      bookmarks={bookmarks} toggleBookmark={toggleBookmark}
      myChannel={myChannel} trackers={trackers}
    />;
  } else if (route.page === "trackers") {
    body = <window.TrackersPage
      trackers={trackers} setTrackers={setTrackers}
      activeTracker={activeTracker} setActiveTracker={setActiveTracker}
      onOpenVideo={openVideo} onOpenChannel={openChannel}
      bookmarks={bookmarks} toggleBookmark={toggleBookmark}
    />;
  } else if (route.page === "bookmarks") {
    body = <window.BookmarksPage
      bookmarks={bookmarks} toggleBookmark={toggleBookmark}
      onOpenVideo={openVideo} onOpenChannel={openChannel}
      videoCache={videoCache}
    />;
  } else if (route.page === "channel") {
    body = <window.ChannelPage
      handle={route.id} onOpenVideo={openVideo} onOpenChannel={openChannel} onBack={back}
      trackers={trackers} setTrackers={setTrackers}
      bookmarks={bookmarks} toggleBookmark={toggleBookmark}
    />;
  } else if (route.page === "video") {
    const v = route.video || videoMap.get(route.id) || window.VIDEOS.find(v => v.id === route.id);
    body = v
      ? <window.VideoPage video={v} onBack={back} onOpenChannel={openChannel} onOpenVideo={openVideo} bookmarks={bookmarks} toggleBookmark={toggleBookmark}/>
      : <div className="page"><div className="empty">Video not found.</div></div>;
  } else if (route.page === "trending-formats") {
    body = <window.TrendingFormatsPage
      onOpenVideo={openVideo} onOpenChannel={openChannel}
      bookmarks={bookmarks} toggleBookmark={toggleBookmark}
      myChannel={myChannel} trackers={trackers}
    />;
  } else if (route.page === "thumbnail-winners") {
    body = <window.ThumbnailWinnersPage
      onOpenVideo={openVideo} onOpenChannel={openChannel}
      bookmarks={bookmarks} toggleBookmark={toggleBookmark}
    />;
  } else if (route.page === "idea") {
    body = <window.IdeaGeneratorPage myChannel={myChannel} setMyChannel={setMyChannel} trackers={trackers}/>;
  } else if (route.page === "title") {
    body = <window.TitleGeneratorPage myChannel={myChannel} setMyChannel={setMyChannel} trackers={trackers}/>;
  } else if (route.page === "thumb") {
    body = <window.ThumbGeneratorPage myChannel={myChannel} setMyChannel={setMyChannel} trackers={trackers}/>;
  } else if (route.page === "compare") {
    body = <window.CompareVideosPage
      onOpenVideo={openVideo} onOpenChannel={openChannel}
      bookmarks={bookmarks} toggleBookmark={toggleBookmark} trackers={trackers}
    />;
  } else if (route.page === "thumb-mockup") {
    body = <window.ThumbMockupPage onOpenVideo={openVideo} bookmarks={bookmarks} trackers={trackers} myChannel={myChannel}/>;
  } else if (route.page === "settings") {
    body = <window.SettingsPage/>;
  } else {
    body = <div className="page"><div className="empty">Page not found.</div></div>;
  }

  return (
    <div className="app">
      <Sidebar route={route} navigate={navRoot} myChannel={myChannel} hasKeys={hasKeys}/>
      <div className="main">
        <TopBar search={search} setSearch={setSearch} onSearchSelect={onSearchSelect} navigate={navigate} videoMap={videoMap}/>
        {body}
      </div>
      <window.TweaksPanelHost t={t} setTweak={setTweak}/>
    </div>
  );
}
window.App = App;

/* ── Tweaks panel host ── */
function TweaksPanelHost({ t, setTweak }) {
  const { TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakColor, TweakSlider } = window;
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Theme">
        <TweakRadio label="Mode" value={t.theme} onChange={v => setTweak("theme", v)}
          options={[{ value: "dark", label: "Dark" }, { value: "light", label: "Light" }]}/>
      </TweakSection>
      <TweakSection label="Accent">
        <TweakColor label="Color" value={t.accent} onChange={v => setTweak("accent", v)}
          options={["#a3ff3b", "#5b8cff", "#ff8a3b", "#ec4899", "#facc15"]}/>
      </TweakSection>
      <TweakSection label="Layout">
        <TweakRadio label="Density" value={t.density} onChange={v => setTweak("density", v)}
          options={[{ value: "compact", label: "Compact" }, { value: "cozy", label: "Cozy" }, { value: "spacious", label: "Spacious" }]}/>
        <TweakSlider label="Sidebar width" min={200} max={300} step={4} value={t.sidebarWidth} onChange={v => setTweak("sidebarWidth", v)} unit="px"/>
        <TweakSelect label="Thumbnail aspect" value={t.thumbAspect} onChange={v => setTweak("thumbAspect", v)} options={[
          { value: "16/9", label: "16:9 (YouTube)" },
          { value: "4/3",  label: "4:3" },
          { value: "1/1",  label: "1:1 square" },
          { value: "3/2",  label: "3:2" },
        ]}/>
      </TweakSection>
    </TweaksPanel>
  );
}
window.TweaksPanelHost = TweaksPanelHost;

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
