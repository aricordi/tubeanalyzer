// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {hasDeckStage && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
// Shared atoms / helpers / icons

function fmtNum(n) {
  if (n >= 1_000_000) return (n/1_000_000).toFixed(n>=10_000_000?0:1).replace(/\.0$/,"") + "M";
  if (n >= 1_000) return Math.round(n/1_000) + "K";
  return String(n);
}
function classNames(...x) { return x.filter(Boolean).join(" "); }

// Heat color for outlier multiplier
function outlierHeat(m) {
  if (m < 1) return { bg: "#1f3a8a22", fg: "#7aa2ff", ring: "#3b82f6" };
  if (m < 1.5) return { bg: "#0c4a6e33", fg: "#67e8f9", ring: "#22d3ee" };
  if (m < 2.5) return { bg: "#facc1522", fg: "#facc15", ring: "#facc15" };
  if (m < 4)   return { bg: "#f9731633", fg: "#fdba74", ring: "#f97316" };
  return                { bg: "#ef444433", fg: "#fca5a5", ring: "#ef4444" };
}

function Outlier({ m, size }) {
  const c = outlierHeat(m);
  return (
    <span className="outlier" style={{ background: c.bg, color: c.fg, fontSize: size==="lg"?14:12, padding: size==="lg"?"6px 12px":"4px 10px" }}>
      <span className="outlier-dot" style={{ background: c.ring }}></span>
      {m.toFixed(1)}x

  );
}
window.Outlier = Outlier;
window.outlierHeat = outlierHeat;
window.fmtNum = fmtNum;

  }[video.thumbStyle || 0];

// Sparkline
function Sparkline({ data, color="var(--accent)", h=40, fill=true }) {
  const w = 200;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((d,i)=>{
    const x = (i/(data.length-1))*w;
    const y = h - ((d-min)/range)*(h-4) - 2;
    return [x,y];
  });
  const line = pts.map(([x,y],i)=> (i===0?`M${x},${y}`:`L${x},${y}`)).join(" ");
  const area = line + ` L${w},${h} L0,${h} Z`;
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      {fill && <path d={area} fill={color} fillOpacity=".15"/>}
      <path d={line} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>
    </svg>
  );
}
window.Sparkline = Sparkline;

// Range slider (dual-thumb)
function RangeSlider({ min, max, step=1, value, onChange, format=(v)=>v }) {
  const [a,b] = value;
  const trackRef = useRef(null);
  const dragRef = useRef(null);
  function onPointerDown(which, e) {
    dragRef.current = which;
    e.preventDefault();
  }
  useEffect(()=>{
    function move(e) {
      if (!dragRef.current || !trackRef.current) return;
      const r = trackRef.current.getBoundingClientRect();
      const t = Math.max(0, Math.min(1, (e.clientX - r.left)/r.width));
      const raw = min + t*(max-min);
      const v = Math.round(raw/step)*step;
      if (dragRef.current === "a") onChange([Math.min(v,b), b]);
      else onChange([a, Math.max(v,a)]);
    }
    function up() { dragRef.current = null; }
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
    return ()=> { window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); };
  }, [a,b,onChange,min,max,step]);
  const pa = ((a-min)/(max-min))*100;
  const pb = ((b-min)/(max-min))*100;
  return (
    <div className="range-row">
      <div className="range-track" ref={trackRef}>
        <div className="range-fill" style={{ left: pa+"%", width: (pb-pa)+"%" }}></div>
        <div className="range-thumb" style={{ left: pa+"%" }} onPointerDown={(e)=>onPointerDown("a",e)}></div>
        <div className="range-thumb" style={{ left: pb+"%" }} onPointerDown={(e)=>onPointerDown("b",e)}></div>
      </div>
      <div className="range-val mono">{format(a)} – {format(b)}</div>
    </div>
  );
}
window.RangeSlider = RangeSlider;

</script>

function applyFilters(videos, f, search) {
  return videos.filter(v => {
    if (f.niche!=="All" && v.niche !== f.niche) return false;
    if (v.multiplier < f.multRange[0] || v.multiplier > f.multRange[1]) return false;
    if (v.subs < f.subsRange[0] || v.subs > f.subsRange[1]) return false;
    const ls = window.lengthSec(v.length);
    if (ls < f.lengthRange[0] || ls > f.lengthRange[1]) return false;
    if (window.agoDays(v.ago) > f.ageDays) return false;
    if (search) {
      const s = search.toLowerCase();
      if (!(v.title.toLowerCase().includes(s) || v.channel.toLowerCase().includes(s) || v.niche.toLowerCase().includes(s))) return false;
    }
    return true;
  }).sort((a,b)=>{
    if (f.sort==="multiplier") return b.multiplier - a.multiplier;
    if (f.sort==="views") return b.views - a.views;
    if (f.sort==="subsAsc") return a.subs - b.subs;
    return window.agoDays(a.ago) - window.agoDays(b.ago);
  });
}
window.applyFilters = applyFilters;

          bookmarked={bookmarks.includes(v.id)} onBookmark={onBookmark}/>
      ))}
    </div>
  );
}

    const [gemKey, setGemKey] = useState(window.TubeAPI.Keys.getGemini() || '');

          instructions={

        <ApiKeyCard

          icon="✨"

          optional

              Get your free key from{' '}
              <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer"

              Click "Get API key" → "Create API key". Free tier: 1,500 requests/day.

  function OnboardingBanner({ onSetup, onDismiss }) {

  /* ── error formatter ── */
  function friendlyError(e) {
    const msg = e?.message || String(e);
    if (msg.includes('NO_KEY'))     return 'No key provided. Paste your API key above.';
    if (msg.includes('BAD_KEY'))    return 'Invalid key — check it was copied completely.';
    if (msg.includes('QUOTA'))      return 'Daily quota exceeded. Free quota resets at midnight Pacific time.';
    if (msg.includes('NetworkError') || msg.includes('Failed to fetch'))
      return 'Network error — check your internet connection.';
    return msg.slice(0, 120);
  }

  /* ── exports ── */
  window.SetupPage = SetupPage;
  window.SettingsPage = SettingsPage;
  window.OnboardingBanner = OnboardingBanner;
}());

<script type="text/babel">
// Pages: Home, Trackers, Channel deep-dive
const { Avatar, Outlier, Thumb, Icons, Sparkline, FilterBar, VideoGrid, applyFilters,
        fmtNum, classNames, Spinner, Skeleton } = window;
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ── useDebounce ── */
function useDebounce(value, delay) {
  const [deb, setDeb] = useState(value);
  useEffect(() => {
    const t = setTimeout(() => setDeb(value), delay);
    return () => clearTimeout(t);
  }, [value, delay]);
  return deb;
}

/* ── DemoNotice ── */
function DemoNotice({ onGoToSettings }) {
  const [dismissed, setDismissed] = useState(() => !!sessionStorage.getItem('demoNoticeDismissed'));
  if (dismissed || window.TubeAPI?.Keys?.hasYt()) return null;
  return (
    <div style={{
      background: 'var(--accent)11', border: '1px solid var(--accent)33',
      borderRadius: 8, padding: '10px 14px', marginBottom: 14,
      display: 'flex', alignItems: 'center', gap: 12, fontSize: 13,
    }}>
      <span>📡</span>
      <span style={{ flex: 1, color: 'var(--fg-mute)' }}>
        Demo mode — showing sample data.{' '}
        <button onClick={onGoToSettings} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontWeight: 600 }}>
          Add a free YouTube API key
        </button>{' '}
        to see real videos.
      </span>
      <button onClick={() => { sessionStorage.setItem('demoNoticeDismissed', '1'); setDismissed(true); }}
        style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--fg-dim)', fontSize: 16, padding: 0 }}>×</button>
    </div>
  );
}

/* ── VideoSkeletons ── */
function VideoSkeletons({ count = 12 }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 14 }}>
      {Array.from({ length: count }).map((_, i) => (
        <div key={i} style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 12, overflow: 'hidden' }}>
          <Skeleton h={158} radius={0}/>
          <div style={{ padding: 14 }}>
            <Skeleton h={14} style={{ marginBottom: 8 }}/>
            <Skeleton h={12} w="70%" style={{ marginBottom: 6 }}/>
            <Skeleton h={11} w="45%"/>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ======================= HOME ======================= */
function HomePage({ filters, setFilters, search, onOpenVideo, onOpenChannel, bookmarks, toggleBookmark, niches, myChannel, trackers, onGoToSettings }) {
  const [scope, setScope] = useState("all");
  const [loading, setLoading] = useState(false);
  const [apiVideos, setApiVideos] = useState(null);
  const [apiError, setApiError] = useState('');
  const fetchRef = useRef(0);

  const myCh = window.CHANNELS.find(c => c.handle === myChannel);
  const myNiche = myCh?.niche;
  const trackedSet = new Set(trackers.flatMap(t => t.channels));
  const debouncedSearch = useDebounce(search, 600);

  const doFetch = useCallback((q) => {
    if (!window.TubeAPI?.Keys?.hasYt()) return;
    const id = ++fetchRef.current;
    setLoading(true); setApiError('');
    window.TubeAPI.fetchOutlierFeed(q || 'youtube viral tutorial', { maxResults: 50 })
      .then(videos => { if (fetchRef.current === id) { setApiVideos(videos); setLoading(false); } })
      .catch(err => { if (fetchRef.current === id) { setApiError(err.message); setLoading(false); } });
  }, []);

  useEffect(() => {
    const q = debouncedSearch || (scope === 'niche' && myNiche ? myNiche + ' tips' : '');
    doFetch(q);
  }, [debouncedSearch, scope, myNiche, doFetch]);

  const allVideos = apiVideos || window.VIDEOS;

  const filtered = useMemo(() => {
    let list = allVideos;
    if (scope === 'niche' && !apiVideos) {
      list = list.filter(v => v.niche === myNiche || trackedSet.has(v.channel));
    }
    return applyFilters(list, filters, search);
  }, [allVideos, filters, search, scope, myNiche, apiVideos]);

  const total = apiVideos ? apiVideos.length :
    (scope === 'niche' ? window.VIDEOS.filter(v => v.niche === myNiche || trackedSet.has(v.channel)).length : window.VIDEOS.length);

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <h1 className="page-title">Outlier feed</h1>
          <p className="page-sub">Videos ranked by how badly they beat their channel's baseline. Filter, sort, drill in — then copy what works.</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn" onClick={() => doFetch(search)} disabled={loading}>
            {loading ? <Spinner size={14}/> : <Icons.Refresh size={14}/>} Refresh
          </button>
          <button className="btn btn-primary" onClick={() => {
            const v = filtered[Math.floor(Math.random() * filtered.length)];
            if (v) onOpenVideo(v);
          }}>
            <Icons.Sparkle size={14}/> Random outlier
          </button>
        </div>
      </div>

      <DemoNotice onGoToSettings={onGoToSettings}/>

      {apiError && (
        <div style={{ background: 'var(--hot-3)22', border: '1px solid var(--hot-3)44', borderRadius: 8, padding: '10px 14px', marginBottom: 14, fontSize: 13, color: 'var(--hot-3)' }}>
          ⚠ YouTube API: {apiError} — showing sample data instead.
        </div>
      )}

      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        <button className={classNames("chip", scope === "all" && "chip-accent active")} onClick={() => setScope("all")}>All YouTube</button>
        <button className={classNames("chip", scope === "niche" && "chip-accent active")} onClick={() => setScope("niche")}>Your niche · {myNiche}</button>
      </div>

      <FilterBar filters={filters} setFilters={setFilters} niches={niches}/>

      <div className="section-head">
        <div className="section-title mono" style={{ color: "var(--fg-mute)" }}>
          {loading ? 'Fetching…' : `${filtered.length} of ${total} videos`}
          {apiVideos && !loading && <span style={{ color: 'var(--accent)', marginLeft: 8, fontSize: 11 }}>● LIVE</span>}
        </div>
        <div className="section-link mono">
          {filters.sort === "multiplier" ? "sorted by outlier" : filters.sort === "views" ? "sorted by views" : filters.sort === "subsAsc" ? "smallest channels first" : "newest first"}
        </div>
      </div>

      {loading ? <VideoSkeletons/> :
        <VideoGrid videos={filtered} onOpen={onOpenVideo} onOpenChannel={onOpenChannel} bookmarks={bookmarks} onBookmark={toggleBookmark}/>
      }
    </div>
  );
}
window.HomePage = HomePage;

/* ======================= TRACKERS ======================= */
function TrackersPage({ trackers, setTrackers, activeTracker, setActiveTracker, onOpenVideo, onOpenChannel, bookmarks, toggleBookmark }) {
  const [newTrackerName, setNewTrackerName] = useState("");
  const [creating, setCreating] = useState(false);

  function createTracker() {
    if (!newTrackerName.trim()) return;
    const id = "t_" + Date.now();
    const next = [...trackers, { id, name: newTrackerName.trim(), channels: [], channelMeta: {} }];
    setTrackers(next);
    setActiveTracker(id);
    setNewTrackerName(""); setCreating(false);
  }
  function deleteTracker(id) {
    const next = trackers.filter(t => t.id !== id);
    setTrackers(next);
    if (activeTracker === id) setActiveTracker(next[0]?.id || null);
  }

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <h1 className="page-title">Trackers</h1>
          <p className="page-sub">Group competitor channels into trackers and get a live, ranked feed of their newest videos with outlier signal, similar channels, and AI breakdowns.</p>
        </div>
      </div>
      <div className="tracker-list">
        <div className="tracker-side">
          {trackers.map(t => (
            <div key={t.id} className={classNames("tracker-row", t.id === activeTracker && "active")} onClick={() => setActiveTracker(t.id)}>
              <div style={{ width: 34, height: 34, borderRadius: 8, background: "var(--bg-3)", display: "grid", placeItems: "center", color: "var(--accent)" }}>
                <Icons.Folder size={16}/>
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="tracker-row-name" style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{t.name}</div>
                <div className="tracker-row-meta">{t.channels.length} channel{t.channels.length === 1 ? "" : "s"}</div>
              </div>
              <button className="btn-icon" onClick={e => { e.stopPropagation(); deleteTracker(t.id); }} title="Delete tracker" style={{ color: "var(--fg-dim)" }}>
                <Icons.Trash size={14}/>
              </button>
            </div>
          ))}
          {creating ? (
            <div style={{ display: "flex", gap: 6, padding: 8 }}>
              <input autoFocus value={newTrackerName} onChange={e => setNewTrackerName(e.target.value)}
                onKeyDown={e => e.key === "Enter" && createTracker()}
                placeholder="Tracker name…"
                style={{ flex: 1, background: "var(--bg-2)", border: "1px solid var(--line)", borderRadius: 8, padding: "8px 10px", outline: 0, fontSize: 13 }}/>
              <button className="btn btn-primary" onClick={createTracker}>Add</button>
            </div>
          ) : (
            <button className="tracker-row" onClick={() => setCreating(true)} style={{ color: "var(--fg-mute)" }}>
              <div style={{ width: 34, height: 34, borderRadius: 8, background: "var(--bg-2)", display: "grid", placeItems: "center" }}>
                <Icons.Plus size={16}/>
              </div>
              <span>New tracker</span>
            </button>
          )}
        </div>
        <div>
          {activeTracker
            ? <TrackerDetail tracker={trackers.find(t => t.id === activeTracker)} setTrackers={setTrackers} trackers={trackers} onOpenVideo={onOpenVideo} onOpenChannel={onOpenChannel} bookmarks={bookmarks} toggleBookmark={toggleBookmark}/>
            : <div className="empty">Create a tracker to start following competitors.</div>}
        </div>
      </div>
    </div>
  );
}
window.TrackersPage = TrackersPage;

function TrackerDetail({ tracker, setTrackers, trackers, onOpenVideo, onOpenChannel, bookmarks, toggleBookmark }) {
  const [search, setSearch] = useState("");
  const [adding, setAdding] = useState(false);
  const [apiResults, setApiResults] = useState(null);
  const [searching, setSearching] = useState(false);
  const [realVideos, setRealVideos] = useState(null);
  const [loadingVideos, setLoadingVideos] = useState(false);

  const debouncedSearch = useDebounce(search, 450);

  // Channel search via YouTube API
  useEffect(() => {
    if (!adding || !debouncedSearch || !window.TubeAPI?.Keys?.hasYt()) {
      setApiResults(null); return;
    }
    let active = true;
    setSearching(true);
    window.TubeAPI.searchChannels(debouncedSearch, 8)
      .then(r => { if (active) { setApiResults(r); setSearching(false); } })
      .catch(() => { if (active) { setApiResults(null); setSearching(false); } });
    return () => { active = false; };
  }, [debouncedSearch, adding]);

  // Fetch real videos for real channel IDs in the tracker
  useEffect(() => {
    const realIds = (tracker.channels || []).filter(id => id.startsWith('UC'));
    if (!realIds.length || !window.TubeAPI?.Keys?.hasYt()) return;
    let active = true;
    setLoadingVideos(true);
    Promise.all(realIds.map(id =>
      window.TubeAPI.fetchChannelWithVideos(id, 20)
        .then(data => data?.videos || [])
        .catch(() => [])
    )).then(all => { if (active) { setRealVideos(all.flat()); setLoadingVideos(false); } });
    return () => { active = false; };
  }, [JSON.stringify(tracker.channels)]);

  function updateTracker(patch) {
    setTrackers(trackers.map(t => t.id === tracker.id ? { ...t, ...patch } : t));
  }
  function addMockChannel(handle) {
    if (tracker.channels.includes(handle)) return;
    updateTracker({ channels: [...tracker.channels, handle] });
  }
  function addRealChannel(ch) {
    const id = ch.id || ch.handle;
    if (tracker.channels.includes(id)) return;
    const meta = { ...(tracker.channelMeta || {}), [id]: ch };
    updateTracker({ channels: [...tracker.channels, id], channelMeta: meta });
  }
  function removeChannel(id) {
    const meta = { ...(tracker.channelMeta || {}) };
    delete meta[id];
    updateTracker({ channels: tracker.channels.filter(c => c !== id), channelMeta: meta });
  }
  function addToTrackerFromSimilar(handle) {
    addMockChannel(handle);
  }

  function getChannelMeta(id) {
    return window.CHANNELS.find(c => c.handle === id) || (tracker.channelMeta || {})[id] || { handle: id, name: id, subs: 0, niche: '' };
  }

  const similar = useMemo(() => {
    const niches = new Set((tracker.channels || []).map(id => getChannelMeta(id)?.niche).filter(Boolean));
    if (!niches.size) return window.CHANNELS.slice(0, 8);
    return window.CHANNELS.filter(c => niches.has(c.niche) && !tracker.channels.includes(c.handle)).slice(0, 10);
  }, [tracker.channels, tracker.channelMeta]);

  const mockVideos = useMemo(() => {
    const handles = (tracker.channels || []).filter(id => !id.startsWith('UC'));
    return window.VIDEOS.filter(v => handles.includes(v.channel)).sort((a, b) => b.multiplier - a.multiplier);
  }, [tracker.channels]);

  const videos = useMemo(() => {
    const combined = [...(realVideos || []), ...mockVideos];
    return combined.sort((a, b) => b.multiplier - a.multiplier);
  }, [realVideos, mockVideos]);

  const stats = useMemo(() => {
    if (!videos.length && !tracker.channels?.length) return null;
    const avgMult = videos.length ? videos.reduce((a, v) => a + v.multiplier, 0) / videos.length : 0;
    const totalSubs = (tracker.channels || []).reduce((a, id) => a + (getChannelMeta(id)?.subs || 0), 0);
    const hot = videos.filter(v => v.multiplier >= 2.5).length;
    const recent = videos.filter(v => (v.daysAgo || 0) <= 30).length;
    return { avgMult, totalSubs, hot, recent };
  }, [videos, tracker.channels, tracker.channelMeta]);

  // Display search results (real API results take priority, else filter mock channels)
  const displayResults = apiResults || window.CHANNELS.filter(c =>
    !tracker.channels?.includes(c.handle) &&
    (!search || c.handle.toLowerCase().includes(search.toLowerCase()) || (c.name || '').toLowerCase().includes(search.toLowerCase()))
  ).slice(0, 8);

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
        <div>
          <div style={{ fontSize: 12, color: "var(--fg-dim)", letterSpacing: ".08em", textTransform: "uppercase" }}>Tracker</div>
          <h2 style={{ fontSize: 28, fontWeight: 700, letterSpacing: "-.02em", margin: "4px 0 6px" }}>{tracker.name}</h2>
          <div style={{ color: "var(--fg-mute)", fontSize: 14 }}>{tracker.channels?.length || 0} channel{tracker.channels?.length === 1 ? "" : "s"} · {videos.length} videos tracked</div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn"><Icons.Bell size={14}/> Alerts</button>
          <button className="btn"><Icons.Share size={14}/> Share</button>
          <button className="btn btn-primary" onClick={() => setAdding(s => !s)}><Icons.Plus size={14}/> Add channel</button>
        </div>
      </div>

      {adding && (
        <div className="advanced-panel" style={{ gridTemplateColumns: "1fr", marginBottom: 18 }}>
          <div>
            <div className="adv-label">
              Search a channel to add
              {window.TubeAPI?.Keys?.hasYt() && <span style={{ color: 'var(--accent)', marginLeft: 8, fontSize: 11 }}>● Live YouTube search</span>}
            </div>
            <div style={{ position: 'relative' }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="@channel name or keyword…"
                style={{ width: "100%", background: "var(--bg-2)", border: "1px solid var(--line)", borderRadius: 10, padding: "10px 40px 10px 14px", outline: 0, fontSize: 14, boxSizing: 'border-box' }}/>
              {searching && (
                <div style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)' }}>
                  <Spinner size={16}/>
                </div>
              )}
            </div>
            {!window.TubeAPI?.Keys?.hasYt() && (
              <div style={{ fontSize: 12, color: 'var(--fg-dim)', marginTop: 6 }}>
                Showing sample channels. Add a YouTube API key in Settings to search any channel.
              </div>
            )}
            <div style={{ marginTop: 12, display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 8 }}>
              {displayResults.map(c => {
                const isReal = c.isReal === true;
                const id = c.id || c.handle;
                return (
                  <button key={id} className="chan-card"
                    onClick={() => isReal ? addRealChannel(c) : addMockChannel(c.handle || id)}
                    style={{ flex: "unset", padding: 10 }}>
                    <Avatar handle={c.handle || id}/>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                        @{c.handle || c.name || id}
                      </div>
                      <div style={{ fontSize: 11, color: "var(--fg-dim)" }}>{fmtNum(c.subs || 0)} · {c.niche || 'YouTube'}</div>
                    </div>
                    <div className="chan-card-add"><Icons.Plus size={14}/></div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {!tracker.channels?.length ? (
        <div className="empty">No channels yet. Click <strong>Add channel</strong> to start tracking competitors.</div>
      ) : (
        <>
          <div className="section-head"><div className="section-title">Tracked channels</div></div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 18 }}>
            {tracker.channels.map(id => {
              const c = getChannelMeta(id);
              return (
                <div key={id} className="chip" style={{ padding: "6px 6px 6px 8px", gap: 8 }}>
                  <span onClick={() => onOpenChannel(id)} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                    <Avatar handle={c.handle || id}/>
                    <span>@{c.handle || id}</span>
                    <span style={{ color: "var(--fg-dim)" }}>{fmtNum(c.subs || 0)}</span>
                  </span>
                  <button onClick={() => removeChannel(id)} style={{ padding: 4, color: "var(--fg-dim)" }}><Icons.X size={12}/></button>
                </div>
              );
            })}
          </div>

          {stats && (
            <div className="metric-row">
              <div className="metric"><div className="metric-label">Avg outlier</div><div className="metric-value">{stats.avgMult.toFixed(2)}x</div><div className="metric-delta mono">across tracked videos</div></div>
              <div className="metric"><div className="metric-label">Combined reach</div><div className="metric-value">{fmtNum(stats.totalSubs)}</div><div className="metric-delta mono">total subscribers</div></div>
              <div className="metric"><div className="metric-label">Hot videos</div><div className="metric-value">{stats.hot}</div><div className="metric-delta mono">multiplier ≥ 2.5×</div></div>
              <div className="metric"><div className="metric-label">Posted (30d)</div><div className="metric-value">{stats.recent}</div><div className="metric-delta mono">last month</div></div>
            </div>
          )}

          <div className="section-head"><div className="section-title">Similar channels</div><div className="section-link">based on niche overlap</div></div>
          <div className="chan-row">
            {similar.map(c => (
              <div key={c.handle} className="chan-card">
                <Avatar handle={c.handle} size="lg"/>
                <div style={{ minWidth: 0, flex: 1 }} onClick={() => onOpenChannel(c.handle)}>
                  <div style={{ fontSize: 14, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>@{c.handle}</div>
                  <div style={{ fontSize: 12, color: "var(--fg-dim)" }}>{fmtNum(c.subs)} subs · {c.niche}</div>
                </div>
                <button className="chan-card-add" onClick={e => { e.stopPropagation(); addToTrackerFromSimilar(c.handle); }} title="Add to tracker">
                  <Icons.Plus size={14}/>
                </button>
              </div>
            ))}
          </div>

          <div className="section-head">
            <div className="section-title">Ranked videos</div>
            <div className="section-link mono" style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              {loadingVideos ? <><Spinner size={13}/> loading…</> : `${videos.length} total · sorted by outlier`}
              {realVideos && !loadingVideos && <span style={{ color: 'var(--accent)', fontSize: 11 }}>● LIVE</span>}
            </div>
          </div>
          {loadingVideos && !videos.length
            ? <VideoSkeletons count={6}/>
            : <VideoGrid videos={videos} onOpen={onOpenVideo} onOpenChannel={onOpenChannel} bookmarks={bookmarks} onBookmark={toggleBookmark}/>
          }

          {window.TrackerPatternLab && <window.TrackerPatternLab tracker={tracker} onOpenVideo={onOpenVideo} onOpenChannel={onOpenChannel}/>}
        </>
      )}
    </div>
  );
}

/* ======================= CHANNEL DEEP DIVE ======================= */
function ChannelPage({ handle, onOpenVideo, onOpenChannel, onBack, trackers, setTrackers, bookmarks, toggleBookmark }) {
  const [realData, setRealData] = useState(null);
  const [loading, setLoading] = useState(false);

  // If handle is a YouTube channel ID (starts with UC), always fetch real data.
  // If it's a mock handle, fetch real data as enrichment if API key present.
  const isRealId = handle?.startsWith('UC');

  useEffect(() => {
    if (!window.TubeAPI?.Keys?.hasYt()) return;
    let active = true;
    setLoading(true);
    window.TubeAPI.fetchChannelWithVideos(handle, 30)
      .then(data => { if (active) { setRealData(data); setLoading(false); } })
      .catch(() => { if (active) { setLoading(false); } });
    return () => { active = false; };
  }, [handle]);

  const channel = realData?.channel || window.CHANNELS.find(c => c.handle === handle) || { handle, name: handle, subs: 0, avgViews: 0, niche: '', colors: ['#5b8cff', '#1e3a8a'] };
  const videos = useMemo(() => {
    if (realData) return [...realData.videos].sort((a, b) => b.multiplier - a.multiplier);
    return window.VIDEOS.filter(v => v.channel === handle).sort((a, b) => window.agoDays(a.ago) - window.agoDays(b.ago));
  }, [handle, realData]);

  const similar = useMemo(() => window.CHANNELS.filter(c => c.niche === channel?.niche && c.handle !== handle).slice(0, 8), [handle, channel]);
  const sparkData = videos.slice(0, 12).map(v => v.views).reverse();
  const avgMult = videos.reduce((a, v) => a + v.multiplier, 0) / (videos.length || 1);
  const bestVideo = videos.slice().sort((a, b) => b.multiplier - a.multiplier)[0];

  const formatCount = {};
  videos.forEach(v => { formatCount[v.format || 'Other'] = (formatCount[v.format || 'Other'] || 0) + 1; });
  const topFormats = Object.entries(formatCount).sort((a, b) => b[1] - a[1]).slice(0, 5);

  const [showTrackerMenu, setShowTrackerMenu] = useState(false);
  function addToTracker(trackerId) {
    setTrackers(trackers.map(t => t.id === trackerId && !t.channels.includes(handle) ? { ...t, channels: [...t.channels, handle] } : t));
  }

  return (
    <div className="page">
      <button className="btn btn-ghost" onClick={onBack} style={{ marginBottom: 18 }}><Icons.Back size={14}/> Back</button>

      {loading && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18, color: 'var(--fg-mute)', fontSize: 13 }}>
          <Spinner size={16}/> Loading live channel data…
        </div>
      )}

      <div className="channel-hero">
        <Avatar handle={channel.handle || handle} size="xl"/>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 12, color: "var(--fg-dim)", letterSpacing: ".08em", textTransform: "uppercase" }}>{channel.niche || 'YouTube'} channel</div>
          <h1 className="page-title" style={{ marginTop: 4 }}>@{channel.handle || handle}</h1>
          <div style={{ color: "var(--fg-mute)", fontSize: 14, marginTop: 6 }}>
            {channel.name} · {fmtNum(channel.subs || 0)} subscribers · {videos.length} tracked videos
            {realData && <span style={{ color: 'var(--accent)', marginLeft: 10, fontSize: 12 }}>● LIVE</span>}
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, position: "relative" }}>
          <button className="btn"><Icons.Bell size={14}/> Watch</button>
          <button className="btn btn-primary" onClick={() => setShowTrackerMenu(s => !s)}><Icons.Plus size={14}/> Add to tracker</button>
          {showTrackerMenu && (
            <div style={{ position: "absolute", top: "calc(100% + 6px)", right: 0, background: "var(--bg-1)", border: "1px solid var(--line)", borderRadius: 12, padding: 6, minWidth: 220, zIndex: 20, boxShadow: "0 8px 32px rgba(0,0,0,.45)" }}>
              {trackers.map(t => {
                const has = t.channels?.includes(handle);
                return (
                  <button key={t.id} onClick={() => { addToTracker(t.id); setShowTrackerMenu(false); }}
                    className="tracker-row" disabled={has} style={{ opacity: has ? 0.5 : 1 }}>
                    <Icons.Folder size={14} style={{ color: "var(--accent)" }}/>
                    <span style={{ flex: 1, textAlign: "left", fontSize: 13 }}>{t.name}</span>
                    {has && <Icons.Check size={14}/>}
                  </button>
                );
              })}
              {!trackers.length && <div style={{ padding: 14, fontSize: 12, color: "var(--fg-dim)" }}>No trackers yet.</div>}
            </div>
          )}
        </div>
      </div>

      <div className="metric-row">
        <div className="metric">
          <div className="metric-label">Avg outlier</div>
          <div className="metric-value">{avgMult.toFixed(2)}x</div>
          <div className="metric-delta mono">{avgMult >= 1.5 ? "above baseline" : "near baseline"}</div>
        </div>
        <div className="metric">
          <div className="metric-label">Avg views</div>
          <div className="metric-value">{fmtNum(channel.avgViews || 0)}</div>
          <div className="metric-delta mono">per video</div>
        </div>
        <div className="metric">
          <div className="metric-label">Best multiplier</div>
          <div className="metric-value">{bestVideo?.multiplier.toFixed(1) || '—'}x</div>
          <div className="metric-delta mono">{bestVideo ? `"${bestVideo.title.slice(0, 30)}…"` : 'no videos'}</div>
        </div>
        <div className="metric" style={{ padding: 14 }}>
          <div className="metric-label">Recent trajectory</div>
          <div style={{ marginTop: 8, height: 56 }}>
            <Sparkline data={sparkData.length > 1 ? sparkData : [1, 2]} h={56}/>
          </div>
        </div>
      </div>

      {topFormats.length > 0 && (
        <>
          <div className="section-head"><div className="section-title">What works on this channel</div></div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14, marginBottom: 22 }}>
            {topFormats.map(([fmt, count]) => (
              <div key={fmt} className="metric">
                <div className="metric-label">Format</div>
                <div style={{ fontSize: 16, fontWeight: 600, marginTop: 6 }}>{fmt}</div>
                <div className="metric-delta mono">{count} video{count === 1 ? "" : "s"} · used repeatedly</div>
              </div>
            ))}
          </div>
        </>
      )}

      {similar.length > 0 && (
        <>
          <div className="section-head"><div className="section-title">Similar channels</div></div>
          <div className="chan-row">
            {similar.map(c => (
              <div key={c.handle} className="chan-card" onClick={() => onOpenChannel(c.handle)}>
                <Avatar handle={c.handle} size="lg"/>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>@{c.handle}</div>
                  <div style={{ fontSize: 12, color: "var(--fg-dim)" }}>{fmtNum(c.subs)} · {c.niche}</div>
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      <div className="section-head"><div className="section-title">All videos</div></div>
      {loading && !videos.length ? <VideoSkeletons count={8}/> :
        <VideoGrid videos={videos} onOpen={onOpenVideo} onOpenChannel={onOpenChannel} bookmarks={bookmarks} onBookmark={toggleBookmark}/>
      }
    </div>
  );
}
window.ChannelPage = ChannelPage;

</script>
<script type="text/babel">
// Video deep-dive, Trending Formats, Thumbnail Winners, Generators, Bookmarks
const { Avatar, Outlier, Thumb, Icons, Sparkline, fmtNum, classNames, VideoGrid, Spinner } = window;
const { useState, useEffect, useMemo } = React;

/* ── helpers ── */
function scoreHash(v, k) {
  let h = 0;
  const id = v.id || '';
  for (let i = 0; i < id.length; i++) h = (h * 23 + id.charCodeAt(i)) | 0;
  h = (h + (k.charCodeAt(0) || 0) * 7) | 0;
  return 50 + Math.abs(h) % 50;
}

/* ======================= VIDEO DEEP DIVE ======================= */
function VideoPage({ video, onBack, onOpenChannel, onOpenVideo, bookmarks, toggleBookmark }) {
  const [variant, setVariant] = useState(0);
  const variants = [video, ...window.VIDEOS.filter(v => v.channel === video.channel && v.id !== video.id).slice(0, 2)];
  const cur = variants[variant];

  // AI analysis state
  const [analysis, setAnalysis] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [analysisErr, setAnalysisErr] = useState('');

  useEffect(() => {
    setAnalysis(null); setAnalysisErr('');
    if (!window.TubeAPI?.Keys?.hasGemini()) return;
    let active = true;
    setAnalyzing(true);
    window.TubeAPI.analyzeThumb({
      title: cur.title,
      niche: cur.niche,
      thumbUrl: cur.thumbnail || '',
      channelName: cur.channelName || cur.channel,
    }).then(r => {
      if (active) { setAnalysis(r); setAnalyzing(false); }
    }).catch(e => {
      if (active) { setAnalysisErr(e.message); setAnalyzing(false); }
    });
    return () => { active = false; };
  }, [cur.id]);

  // Score rows — real or fallback
  const scoreKeys = [
    ['face_emotion', 'Face / emotion'],
    ['color_contrast', 'Color contrast'],
    ['hook_clarity', 'Hook clarity'],
    ['curiosity_gap', 'Curiosity gap'],
    ['title_sync', 'Title sync'],
    ['mobile_legibility', 'Mobile legibility'],
  ];
  const scores = scoreKeys.map(([key, label]) => ({
    label,
    val: analysis?.scores?.[key] ?? scoreHash(cur, key[0]),
  }));
  const avgScore = analysis?.overall ?? Math.round(scores.reduce((a, s) => a + s.val, 0) / scores.length);

  // Annotations — real or fallback
  const annotations = analysis?.annotations || [
    { x: 18, y: 22, label: 'Big yellow text creates focal point', side: 'r' },
    { x: 78, y: 70, label: 'Reaction circle anchors emotion', side: 'l' },
    { x: 50, y: 55, label: 'Negative space draws eye through', side: 'r' },
  ];

  // Insights — real or fallback
  const insights = analysis
    ? [
        { kind: 'Why it works', color: 'var(--accent)', body: analysis.why_it_works },
        { kind: 'Risk', color: 'var(--hot-4)', body: analysis.risk },
        { kind: 'Try next', color: 'var(--accent)', body: analysis.try_next },
      ].filter(i => i.body)
    : [
        { kind: 'Why it works', color: 'var(--accent)', body: `Aggressive composition typical of high-performing ${cur.niche} videos. Title and image agree on the curiosity gap.` },
        { kind: 'Risk', color: 'var(--hot-4)', body: 'Mobile crop may hide edge elements. Check how it looks at thumbnail size on a phone.' },
        { kind: 'Try next', color: 'var(--accent)', body: `Swap the text tag for a single number to test whether specificity outperforms imperative hooks in ${cur.niche}.` },
      ];

  // Title rewrites — real or fallback
  const titleRewrites = analysis?.title_rewrites?.length
    ? [{ title: cur.title, ctr_lift: 'original' }, ...analysis.title_rewrites.slice(0, 2)]
    : [
        { title: cur.title, ctr_lift: 'original' },
        { title: `I Tried ${cur.title.split(' ').slice(0, 4).join(' ')} for 30 Days`, ctr_lift: '+18% predicted CTR' },
        { title: `The Truth About ${cur.title.split(' ').slice(-3).join(' ')}`, ctr_lift: '+9% predicted CTR' },
      ];

  const comparable = useMemo(() => window.VIDEOS.filter(v => v.format === cur.format && v.id !== cur.id).slice(0, 4), [cur]);

  return (
    <div className="page">
      <button className="btn btn-ghost" onClick={onBack} style={{ marginBottom: 18 }}><Icons.Back size={14}/> Back</button>
      <div className="deep-grid">
        <div>
          <div className="deep-thumb-card">
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{ fontSize: 12, color: "var(--fg-dim)", letterSpacing: ".08em", textTransform: "uppercase" }}>Thumbnail · AI annotated</div>
                {analyzing && <Spinner size={14}/>}
                {analysis && !analyzing && <span style={{ fontSize: 11, color: 'var(--accent)', fontWeight: 600 }}>✦ Gemini</span>}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                {variants.map((v, i) => (
                  <button key={v.id} onClick={() => setVariant(i)}
                    className={classNames("chip", i === variant && "chip-accent active")} style={{ fontSize: 11 }}>
                    {i === 0 ? "This video" : `Variant ${i + 1}`}
                  </button>
                ))}
              </div>
            </div>
            <div className="deep-thumb-frame">
              <Thumb video={cur}/>
              {annotations.map((a, i) => (
                <React.Fragment key={i}>
                  <div className="thumb-marker" style={{ left: `calc(${a.x}% - 12px)`, top: `calc(${a.y}% - 12px)` }}></div>
                  <div className="thumb-anno" style={{
                    left: a.side === "r" ? `calc(${a.x}% + 18px)` : "auto",
                    right: a.side === "l" ? `calc(${100 - a.x}% + 18px)` : "auto",
                    top: `calc(${a.y}% - 10px)`, maxWidth: 220,
                  }}>{a.label}</div>
                </React.Fragment>
              ))}
            </div>
            <h1 style={{ fontSize: 22, fontWeight: 700, margin: "18px 0 0", lineHeight: 1.25, letterSpacing: "-.015em" }}>{cur.title}</h1>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 10, color: "var(--fg-mute)", fontSize: 13 }}>
              <Avatar handle={cur.channel}/>
              <span style={{ cursor: "pointer" }} onClick={() => onOpenChannel(cur.channelId || cur.channel)}>@{cur.channel}</span>
              <span>·</span><span>{fmtNum(cur.subs || 0)} subs</span>
              <span>·</span><span>{cur.ago}</span>
              <span>·</span><span className="mono">{cur.length}</span>

function TrendingFormatsPage({ onOpenVideo, onOpenChannel, bookmarks, toggleBookmark, myChannel, trackers }) {
  const [activeFmt, setActiveFmt] = useState(window.TRENDING_FORMATS[0].id);
  const [nicheFilter, setNicheFilter] = useState("All");
  const [sortBy, setSortBy] = useState("growth");
  const [fitOnly, setFitOnly] = useState(false);

  const myCh = window.CHANNELS.find(c=>c.handle===myChannel);
  const myNiche = myCh?.niche;
  const myFormats = useMemo(()=>{
    const used = new Set(window.VIDEOS.filter(v=>v.channel===myChannel).map(v=>v.format));
    return Array.from(used);
  }, [myChannel]);

  const formatsWithFit = useMemo(()=>{
    return window.TRENDING_FORMATS.map(f => ({
      ...f,
      fit: window.formatFit(f.id, myNiche, myFormats),
      growthN: parseInt(f.growth)
    }));
  }, [myNiche, myFormats]);

  const filtered = useMemo(()=>{
    let list = formatsWithFit.slice();
    if (nicheFilter !== "All") list = list.filter(f => f.niches.includes(nicheFilter));
    if (fitOnly) list = list.filter(f => f.fit >= 50);
    if (sortBy === "growth") list.sort((a,b)=>b.growthN-a.growthN);
    else if (sortBy === "videos") list.sort((a,b)=>b.videos-a.videos);
    else if (sortBy === "fit") list.sort((a,b)=>b.fit-a.fit);
    return list;
  }, [formatsWithFit, nicheFilter, sortBy, fitOnly]);

  const recommended = useMemo(()=> formatsWithFit.slice().sort((a,b)=>b.fit-a.fit).slice(0,3), [formatsWithFit]);

  const fmt = window.TRENDING_FORMATS.find(f=>f.id===activeFmt);
  const matching = useMemo(()=>{
    return window.VIDEOS.filter(v=> fmt.niches.includes(v.niche)).sort((a,b)=>b.multiplier-a.multiplier).slice(0,8);
  }, [activeFmt]);

  function fitColor(s) {
    if (s>=70) return "var(--accent)";
    if (s>=50) return "#facc15";
    if (s>=30) return "#f97316";
    return "var(--fg-dim)";
  }

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <h1 className="page-title">Trending formats</h1>
          <p className="page-sub">Format = the structural pattern of a video. When it pops in one niche it usually pops in adjacent ones first. We score every format against <strong style={{color:"var(--fg)"}}>@{myChannel}</strong> based on niche overlap and what you already do.</p>
        </div>
        <div className="chip chip-accent active mono">Updated {window.NOW}</div>
      </div>

      {/* Recommended for you */}
      <div className="score-card" style={{marginBottom: 24, background: "linear-gradient(135deg, color-mix(in oklch, var(--accent) 8%, var(--bg-1)), var(--bg-1))"}}>
        <div style={{display:"flex", alignItems:"center", gap:10, marginBottom: 14}}>
          <Icons.Sparkle size={16} style={{color:"var(--accent)"}}/>
          <div className="section-title">Recommended for your style</div>
          <div className="mono" style={{fontSize:11, color:"var(--fg-dim)", marginLeft:"auto"}}>based on @{myChannel} · {myNiche}</div>
        </div>
        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))", gap: 12}}>
          {recommended.map(f => (
            <button key={f.id} className="format-card" onClick={()=>setActiveFmt(f.id)} style={{padding: 16, textAlign:"left", cursor:"pointer", borderColor: f.id===activeFmt?"var(--accent)":"var(--line)"}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8}}>
                <div style={{fontSize:14, fontWeight:600, lineHeight: 1.3}}>{f.name}</div>
                <div style={{display:"flex", flexDirection:"column", alignItems:"flex-end"}}>
                  <div className="mono" style={{fontSize:18, fontWeight:700, color: fitColor(f.fit)}}>{f.fit}</div>
                  <div className="mono" style={{fontSize:10, color:"var(--fg-dim)"}}>fit</div>
                </div>
              </div>
              <div style={{fontSize:12, color:"var(--fg-mute)", marginTop: 8}}>{f.growth} this week</div>
            </button>
          ))}
        </div>
      </div>

      {/* Filters */}
      <div className="filterbar" style={{marginBottom: 18}}>
        <select value={nicheFilter} onChange={(e)=>setNicheFilter(e.target.value)} className="chip" style={{appearance:"none", cursor:"pointer", paddingRight: 24}}>
          {["All", ...window.NICHES].map(n=> <option key={n} value={n}>{n==="All"?"All niches":n}</option>)}
        </select>
        <select value={sortBy} onChange={(e)=>setSortBy(e.target.value)} className="chip" style={{appearance:"none", cursor:"pointer", paddingRight: 24}}>
          <option value="growth">Sort: Growth</option>
          <option value="videos">Sort: Video count</option>
          <option value="fit">Sort: Fit for you</option>
        </select>
        <button className={classNames("chip", fitOnly && "chip-accent active")} onClick={()=>setFitOnly(s=>!s)}>
          ✨ Fit ≥ 50
        </button>
        <div style={{flex:1}}></div>
        <div className="mono" style={{fontSize:12, color:"var(--fg-dim)"}}>{filtered.length} formats</div>
      </div>

      <div style={{display:"grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 16, marginBottom: 28}}>
        {filtered.map(f => {
          const isActive = f.id===activeFmt;
          const spark = Array.from({length:12}, (_,i)=> Math.sin(i/2 + f.id.charCodeAt(1))*8 + 20 + i*1.4);
          return (
            <button key={f.id} className="format-card" onClick={()=>setActiveFmt(f.id)} style={{
              borderColor: isActive ? "var(--accent)" : "var(--line)",
              background: isActive ? "color-mix(in oklch, var(--accent) 6%, var(--bg-1))" : "var(--bg-1)",
              textAlign: "left", cursor:"pointer", width:"100%"
            }}>
              <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12}}>
                <div>
                  <div className="mono" style={{fontSize:11, color:"var(--fg-dim)", textTransform:"uppercase", letterSpacing:".1em"}}>Format</div>
                  <div style={{fontSize: 17, fontWeight: 600, marginTop: 4, lineHeight: 1.3}}>{f.name}</div>
                </div>
                <div style={{display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4}}>
                  <div className="format-growth">{f.growth}</div>
                  <div className="mono" style={{fontSize:10, color: fitColor(f.fit), fontWeight:700}}>FIT {f.fit}</div>
                </div>
              </div>
              <div style={{marginTop: 10, fontSize: 12.5, color:"var(--fg-mute)"}}>{f.example}</div>
              <div style={{marginTop: 14, display:"flex", gap: 6, flexWrap:"wrap"}}>
                {f.niches.map(n=> <span key={n} className="chip" style={{fontSize:11, padding:"3px 8px", background: n===myNiche?"color-mix(in oklch, var(--accent) 15%, var(--bg-2))":"var(--bg-2)"}}>{n}</span>)}
              </div>
              <div style={{marginTop: 14}}>
                <Sparkline data={spark} h={36}/>
              </div>
              <div style={{display:"flex", justifyContent:"space-between", marginTop: 8, fontSize:12, color:"var(--fg-dim)"}}>
                <span className="mono">{f.videos} videos this week</span>
                <span style={{color: "var(--accent)"}}>{isActive?"selected":"see examples →"}</span>
              </div>
            </button>
          );
        })}
      </div>

      <div className="section-head">
        <div className="section-title">Top videos using "{fmt.name}"</div>
        <div className="section-link mono">{matching.length} examples</div>
      </div>
      <VideoGrid videos={matching} onOpen={onOpenVideo} onOpenChannel={onOpenChannel} bookmarks={bookmarks} onBookmark={toggleBookmark}/>
    </div>
  );
}
window.TrendingFormatsPage = TrendingFormatsPage;

</script>
<script type="text/babel">
// Discovery Lab — crawls smaller channels, lifts unrelated formats into your niche,
// suggests mashups + 10x rewrites of existing big videos.
const { Avatar, Outlier, Thumb, Icons, Sparkline, fmtNum, classNames, VideoGrid } = window;

function DiscoverPage({ onOpenVideo, onOpenChannel, bookmarks, toggleBookmark, myChannel, trackers }) {
  const [tab, setTab] = useState("breakouts");
  const [crawling, setCrawling] = useState(false);
  const [crawlStep, setCrawlStep] = useState(0);

  const myCh = window.CHANNELS.find(c=>c.handle===myChannel);
  const myNiche = myCh?.niche;
  const myFormats = useMemo(()=> Array.from(new Set(window.VIDEOS.filter(v=>v.channel===myChannel).map(v=>v.format))), [myChannel]);
  const trackedSet = useMemo(()=> new Set(trackers.flatMap(t=>t.channels)), [trackers]);

  // Adjacency for "related but unexplored"
  const adjacency = {
    "Tech":["AI","Crypto","Productivity","Finance"],
    "AI":["Tech","Productivity","Education"],
    "Crypto":["Tech","Finance"],
    "Finance":["Productivity","Crypto","Education"],
    "Cooking":["DIY","Vlog"],
    "DIY":["Cooking","Cars","Tech"],
    "Horror":["Comedy","Vlog"],
    "Vlog":["Comedy","Travel","Horror","Cooking"],
    "Education":["Science","Productivity","Finance"],
    "Gaming":["Tech","Comedy"],
    "Cars":["DIY","Tech"],
    "Beauty":["Vlog","DIY"],
    "Comedy":["Horror","Vlog"],
    "Productivity":["AI","Tech","Education","Finance"],
    "Travel":["Vlog","Cooking"],
    "Science":["Education","Tech"],
  };
  const adjNiches = adjacency[myNiche] || [];

  // ---------- BREAKOUTS: small channels with high outliers, in niche or adjacent
  const breakouts = useMemo(()=>{
    const byChannel = new Map();
    window.VIDEOS.forEach(v=>{
      if (v.channel === myChannel) return;
      if (trackedSet.has(v.channel)) return; // already tracking
      const ch = window.CHANNELS.find(c=>c.handle===v.channel);
      if (!ch) return;
      if (ch.subs > 250000) return; // smaller channels only
      const isRelated = ch.niche === myNiche || adjNiches.includes(ch.niche);
      if (!isRelated) return;
      if (v.multiplier < 2.5) return;
      const cur = byChannel.get(v.channel) || { ch, videos: [], topMult: 0 };
      cur.videos.push(v);
      cur.topMult = Math.max(cur.topMult, v.multiplier);
      byChannel.set(v.channel, cur);
    });
    return Array.from(byChannel.values()).sort((a,b)=>b.topMult-a.topMult).slice(0, 8);
  }, [myChannel, myNiche, trackedSet]);

  // ---------- TRANSPLANTS: high-performing formats from OUTSIDE your niche
  const transplants = useMemo(()=>{
    return window.TRENDING_FORMATS
      .filter(f => !f.niches.includes(myNiche)) // outside your niche
      .map(f => {
        // best video example of this format
        const examples = window.VIDEOS.filter(v=> f.niches.includes(v.niche) && v.multiplier >= 2).sort((a,b)=>b.multiplier-a.multiplier);
        const top = examples[0];
        // build a transplant idea
        const transplantIdea = transplantTitle(f, myNiche, top);
        const why = `Format averages ${f.growth} growth in ${f.niches.join("/")}. No major ${myNiche} channel has tried it yet — first-mover window estimated 4–6 weeks.`;
        const projected = top ? Math.round(top.multiplier * (0.5 + Math.random()*0.4)*10)/10 : 2.4;
        return { format: f, top, transplantIdea, why, projected };
      })
      .sort((a,b)=>parseInt(b.format.growth)-parseInt(a.format.growth))
      .slice(0, 6);
  }, [myNiche]);

  // ---------- MASHUPS: combine 2 high-performing ideas
  const mashups = useMemo(()=>{
    // pick top videos: one from your niche, one from adjacent niche
    const inNiche = window.VIDEOS.filter(v=>v.niche===myNiche).sort((a,b)=>b.multiplier-a.multiplier).slice(0,8);
    const adjacent = window.VIDEOS.filter(v=>adjNiches.includes(v.niche)).sort((a,b)=>b.multiplier-a.multiplier).slice(0,8);
    const out = [];
    for (let i=0; i<6 && i<inNiche.length && i<adjacent.length; i++) {
      const a = inNiche[i];
      const b = adjacent[(i*3)%adjacent.length];
      out.push({
        a, b,
        idea: mashupIdea(a, b, myNiche),
        confidence: Math.round((a.multiplier + b.multiplier) * 12),
      });
    }
    return out;
  }, [myNiche]);

  // ---------- 10x REWRITES: take an existing big-channel hit and propose a sized-up version
  const rewrites = useMemo(()=>{
    const candidates = window.VIDEOS.filter(v => (v.niche===myNiche || adjNiches.includes(v.niche)) && v.multiplier >= 2 && v.channel !== myChannel)
      .sort((a,b)=>b.views-a.views).slice(0, 6);
    return candidates.map(v => ({
      original: v,
      tenx: tenxTitle(v.title),
      angle: tenxAngle(v.title),
      lift: Math.round((1.5 + Math.random()*1.2)*10)/10,
    }));
  }, [myNiche]);

  function startCrawl() {
    setCrawling(true); setCrawlStep(0);
    const steps = ["Seeding from your channel…", "Walking comment graph…", "Scraping recommended sidebars…", "Filtering for outlier signal…", "Cross-referencing format library…", "Done."];
    let i = 0;
    const tick = ()=>{
      i++; setCrawlStep(i);
      if (i < steps.length) setTimeout(tick, 420);
      else setTimeout(()=>setCrawling(false), 600);
    };
    setTimeout(tick, 420);
  }

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <h1 className="page-title">Discovery Lab</h1>
          <p className="page-sub">A crawler that walks outward from your channel — comment graphs, recommended sidebars, related searches — looking for breakout signal you haven't caught yet. Then it remixes what it finds into ideas built for <strong style={{color:"var(--fg)"}}>@{myChannel}</strong>.</p>
        </div>
        <button className="btn btn-primary" onClick={startCrawl} disabled={crawling}>
          <Icons.Sparkle size={14}/> {crawling ? "Crawling…" : "Run new crawl"}
        </button>
      </div>

      {crawling && (
        <div className="score-card" style={{marginBottom: 22, background: "color-mix(in oklch, var(--accent) 6%, var(--bg-1))"}}>
          <div style={{display:"flex", alignItems:"center", gap: 10}}>
            <div className="crawl-spinner"></div>
            <div>
              <div className="mono" style={{fontSize:11, color:"var(--accent)", textTransform:"uppercase", letterSpacing:".1em"}}>Crawler running</div>
              <div style={{fontSize:14, marginTop:2}}>
                {["Seeding from your channel…","Walking comment graph…","Scraping recommended sidebars…","Filtering for outlier signal…","Cross-referencing format library…","Done."][Math.min(crawlStep,5)]}
              </div>
            </div>
            <div style={{flex:1}}></div>
            <div className="mono" style={{fontSize:12, color:"var(--fg-mute)"}}>{Math.min(crawlStep,5)}/5</div>
          </div>
          <div className="crawl-progress"><div style={{width: `${(crawlStep/5)*100}%`}}></div></div>
        </div>
      )}

      <div style={{display:"flex", gap:6, marginBottom: 18, flexWrap:"wrap"}}>
        <button className={classNames("chip", tab==="breakouts" && "chip-accent active")} onClick={()=>setTab("breakouts")}>
          <Icons.Compass size={12}/> Breakout creators · {breakouts.length}
        </button>
        <button className={classNames("chip", tab==="transplants" && "chip-accent active")} onClick={()=>setTab("transplants")}>
          ✦ Format transplants · {transplants.length}
        </button>
        <button className={classNames("chip", tab==="mashups" && "chip-accent active")} onClick={()=>setTab("mashups")}>
          ⚡ Idea mashups · {mashups.length}
        </button>
        <button className={classNames("chip", tab==="10x" && "chip-accent active")} onClick={()=>setTab("10x")}>
          ↑ 10x rewrites · {rewrites.length}

/* ======================= IDEA-GENERATION HELPERS ======================= */
function transplantTitle(format, niche, topVideo) {
  const t = format.name;
  if (t.includes("POV:")) return `POV: You walked in on the ${niche.toLowerCase()} disaster nobody talks about`;
  if (t.includes("$1 vs")) return `$1 ${niche} setup vs $1,000 ${niche} setup`;
  if (t.includes("read every")) return `I read every ${niche.toLowerCase()} blog post for a year so you don't have to`;
  if (t.includes("just killed")) return `This new tool just killed every ${niche.toLowerCase()} workflow`;
  if (t.includes("24 hours")) return `24 hours doing nothing but ${niche.toLowerCase()} — what broke me`;
  if (t.includes("worst-to-best")) return `Every ${niche.toLowerCase()} tool/method, ranked worst to best`;
  if (t.includes("documentary")) return `The mini-documentary about ${niche.toLowerCase()} that YouTube wasn't ready for`;
  if (t.includes("Whisper")) return `(whispered) the ${niche.toLowerCase()} secret nobody is saying out loud`;
  return `${t} — but for ${niche}`;
}
function mashupIdea(a, b, niche) {
  const tokA = pick(a.title);
  const tokB = pick(b.title);
  const templates = [
    `${tokA} meets ${tokB} — the ${niche.toLowerCase()} crossover nobody asked for (but everyone needs)`,
    `What if you took "${trim(a.title)}" and applied "${trim(b.title)}"? I tried it.`,
    `${tokA} × ${tokB}: the ${niche.toLowerCase()} experiment that shouldn't have worked`,
  ];
  return templates[(a.id.charCodeAt(0)+b.id.charCodeAt(0)) % templates.length];
}
function tenxTitle(orig) {
  // bump numbers, bump durations, harden constraints
  let t = orig;
  t = t.replace(/(\d+)\s*(days?|hours?|weeks?|months?)/i, (m, n, u) => `${parseInt(n)*10} ${u}`);
  t = t.replace(/(\d+)/, (m, n) => `${parseInt(n)*10}`);
  if (t === orig) t = `I Did "${trim(orig)}" — But For 10x Longer`;
  return t;
}
function tenxAngle(orig) {
  const angles = [
    "Same idea, longer duration. Endurance content compounds — viewers stay for the punishment.",
    "Bigger number in the title triggers a higher curiosity ceiling without changing the format.",
    "Same hook but with a harder constraint — converts the same audience plus the 'is this even possible' crowd.",
    "Sized-up version makes it shareable as a 'wait, what?' clip on Shorts/TikTok, doubling top-of-funnel.",
  ];
  return angles[orig.length % angles.length];
}
function pick(s) { const w = s.split(/\s+/); return w.slice(0, Math.min(3, w.length)).join(" "); }
function trim(s) { return s.length>40 ? s.slice(0,37)+"…" : s; }
